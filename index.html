function fieldFactor(workType, fullClearRate) { return workType === 'clear' ? (fullClearRate ? 1 : 0.5) : (workType === 'none' || workType === 'office' || workType === 'office_errand') ? 0 : 1; }
// double pay applies once (not stacked) whether it's from a holiday/Sunday or from running 2 rigs

// cumulative count for site+pile, over reports up to (and optionally excluding) a report id
function cumFor(reports, site, pile, uptoDate, excludeId) {
  let sum = 0;

    if (excludeId && r.id === excludeId) continue;
    if (uptoDate && r.date > uptoDate) continue;
    for (const it of r.items) if ((it.pile || '').trim() === (pile || '').trim()) sum += Number(it.count) || 0;

  const myWear = Object.values(myByDate).reduce((sum, r) => sum + wearRate(r.vehicle, rates, r.workType), 0);
  const myMoney = myField + myWear;
  const myLeavesInMonth = myLeaves.filter(l => l.date.slice(0, 7) === historyMonth);

            <span>เดือน {historyMonthTh}</span>
            <span>ทำงาน <b style={{ color: '#e9e6e1' }}>{myDays}</b> วัน</span>

            <span>ค่าออกสนาม <b style={{ color: '#f0b98c', fontSize: 15 }}>{num(myField)}</b> บาท</span>
            <span>ค่ารถ <b style={{ color: '#f0b98c', fontSize: 15 }}>{num(myWear)}</b> บาท</span>

          {historyItems.length === 0 && <div style={{ background: '#2c2f35', border: '1px dashed #4a4f58', borderRadius: 10, padding: '30px 20px', textAlign: 'center', color: '#9a958d', fontSize: 14 }}>ไม่มีรายงานในเดือนนี้</div>}

          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

              if (item.kind === 'leave') {
                const l = item.leave;
                return (
                  <div key={'l-' + l.id} style={{ ...card, borderLeft: '4px solid #f0b98c', padding: '12px 14px', display: 'flex', justifyContent: 'space-between', gap: 10, alignItems: 'flex-start' }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: '#e8762d', fontWeight: 700 }}>{thDate(l.date)}</div>
                      <div style={{ fontSize: 13, color: '#f0b98c', fontWeight: 700, marginTop: 3 }}>🏖 {leaveTypeTh(l.leaveType)}</div>
                      {!!sundaySwapNote(l.leaveType, l.date) && <div style={{ fontSize: 12, color: '#f0b98c', marginTop: 3 }}>⚠ {sundaySwapNote(l.leaveType, l.date)}</div>}
                      {!!l.reason && <div style={{ fontSize: 12, color: '#c8c3bb', marginTop: 3, fontStyle: 'italic' }}>📝 {l.reason}</div>}
                    </div>
                    <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>

                      <button onClick={() => { if (confirm('ลบรายการนี้?')) onDeleteLeave(l.id); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, padding: '5px 9px', fontSize: 12, cursor: 'pointer' }}>ลบ</button>

                  </div>
                );
              }
              const r = item.report;
              const editable = monthLockState(r.date.slice(0, 7), monthLocks) === 'open';
              return (
                <div key={r.id} style={{ ...card, padding: '12px 14px', display: 'flex', justifyContent: 'space-between', gap: 10, alignItems: 'flex-start' }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, color: '#e8762d', fontWeight: 700 }}>{thDate(r.date)} · {r.site}</div>
                    <div style={{ fontSize: 13, color: '#c8c3bb', marginTop: 3 }}>{r.items.length ? r.items.map(i => i.pile + ' × ' + i.count + ' ต้น').join(' · ') : (r.workType === 'clear' ? 'เคลียร์พื้นที่หน้างาน' : r.workType === 'office' ? 'อยู่บริษัท ไม่ได้ออกหน้างาน' : r.workType === 'office_errand' ? 'อยู่บริษัท (ถูกใช้งานไปที่อื่น)' : 'ไปหน้างานแต่ไม่ได้ตอก')}</div>
                    <div style={{ fontSize: 12, color: '#9a958d', marginTop: 3 }}>{r.timeIn}–{r.timeOut} น. · {vehicleTh(r.vehicle)}</div>
                    {!!r.note && <div style={{ fontSize: 12, color: '#c8c3bb', marginTop: 3, fontStyle: 'italic' }}>📝 {r.note}</div>}
                    {r.originalDistanceKm != null && Number(r.originalDistanceKm) !== Number(r.distanceKm) && (() => {
                      const diff = distanceCorrectionMoney(r);
                      return (
                        <div style={{ fontSize: 12, color: '#f0b98c', marginTop: 4, background: '#1b1d21', borderRadius: 5, padding: '6px 10px' }}>
                          ⚠ บริษัทปรับแก้ระยะทางจาก {num(r.originalDistanceKm)} เป็น {num(r.distanceKm)} กม. ({diff >= 0 ? '+' : ''}{num(diff)} บาท)
                        </div>
                      );
                    })()}
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6, flexShrink: 0 }}>
                    {editable ? (
                      <div style={{ display: 'flex', gap: 6 }}>
                        <button onClick={() => onEdit(r)} style={{ background: 'none', border: '1px solid #4a4f58', color: '#e8762d', borderRadius: 5, padding: '5px 9px', fontSize: 12, cursor: 'pointer' }}>แก้ไข</button>
                        <button onClick={() => { if (confirm('ลบรายงานนี้?')) onDelete(r.id); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, padding: '5px 9px', fontSize: 12, cursor: 'pointer' }}>ลบ</button>
                      </div>
                    ) : (
                      <div style={{ fontSize: 11, color: '#9a958d', whiteSpace: 'nowrap' }} title="เดือนนี้ถูกยืนยันข้อมูลแล้ว ไม่สามารถแก้ไขได้">🔒 ยืนยันข้อมูลแล้ว</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      </div>
      )}
    </div>
  );
}

const PIN_RE = /^\d{4}$/;
const onlyDigits4 = v => v.replace(/\D/g, '').slice(0, 4);
const pinBoxStyle = { ...inputStyle, textAlign: 'center', fontSize: 26, letterSpacing: 10, fontWeight: 800 };

function PinDots({ length, max = 4 }) {
  return (
    <div style={{ display: 'flex', gap: 12, justifyContent: 'center', margin: '4px 0 22px' }}>
      {Array.from({ length: max }).map((_, i) => (
        <div key={i} style={{ width: 14, height: 14, borderRadius: '50%', background: i < length ? '#e8762d' : '#4a4f58', transition: 'background .15s' }} />
      ))}
    </div>
  );
}
function PinKeypad({ onDigit, onBackspace }) {
  const keyStyle = { background: '#23262b', border: '1px solid #4a4f58', color: '#e9e6e1', borderRadius: 10, padding: '18px 0', fontSize: 22, fontWeight: 800, cursor: 'pointer' };
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
      {['1', '2', '3', '4', '5', '6', '7', '8', '9'].map(k => <button key={k} onClick={() => onDigit(k)} style={keyStyle}>{k}</button>)}
      <div />
      <button onClick={() => onDigit('0')} style={keyStyle}>0</button>
      <button onClick={onBackspace} style={keyStyle}>⌫</button>
    </div>
  );
}

function CompanyHeader() {
  return (
    <div style={{ textAlign: 'center', marginBottom: 40 }}>
      <img src="./logo.png" alt="RMC" style={{ height: 90, marginBottom: 20 }} />
      <div style={{ fontSize: 26, fontWeight: 800, color: '#e9e6e1' }}>บริษัท ร่วมมิตรคอนกรีต จำกัด</div>
      <div style={{ fontSize: 15, color: '#9a958d', marginTop: 6 }}>ระบบรายงานการตอกเสาเข็ม</div>
    </div>
  );
}

function AdminLoginView({ admins, onSetup, onLogin }) {
  const firstUse = admins.length === 0;
  const [selected, setSelected] = useState(null);
  const [name, setName] = useState('');
  const [position, setPosition] = useState('');
  const [pin, setPin] = useState('');
  const [pin2, setPin2] = useState('');
  const [error, setError] = useState('');

  const submitSetup = async () => {
    if (!name.trim()) return setError('กรุณากรอกชื่อผู้ใช้');
    if (!PIN_RE.test(pin)) return setError('รหัส PIN ต้องเป็นตัวเลข 4 หลัก');
    if (pin !== pin2) return setError('รหัส PIN ไม่ตรงกัน');
    await onSetup(name.trim(), pin, position.trim());
  };
  const submitLogin = async (p) => {
    const ok = await onLogin(selected, p ?? pin);
    if (!ok) { setError('รหัส PIN ไม่ถูกต้อง'); setPin(''); }
  };
  const onKey = (e, fn) => { if (e.key === 'Enter') fn(); };
  useEffect(() => { if (selected && pin.length === 4) submitLogin(pin); }, [pin, selected]);
  useEffect(() => {
    if (!selected) return;
    const handler = (e) => {
      if (/^[0-9]$/.test(e.key)) {
        setPin(prev => prev.length >= 4 ? prev : prev + e.key);
        setError('');
      } else if (e.key === 'Backspace') {
        setPin(prev => prev.slice(0, -1));
        setError('');
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [selected]);

  if (firstUse) {
    return (
      <div style={{ maxWidth: 380, margin: '0 auto', padding: '60px 20px' }}>
        <CompanyHeader />
        <div style={{ ...card, overflow: 'hidden' }}>
          <div style={{ background: '#1b1d21', padding: '16px 20px', borderBottom: '2px solid #e8762d' }}>
            <div style={{ fontSize: 18, fontWeight: 800 }}>ตั้งค่าผู้ใช้คนแรก</div>
            <div style={{ fontSize: 13, color: '#9a958d', marginTop: 2 }}>ยังไม่มีผู้ใช้ — สร้างบัญชีแรกที่นี่</div>
          </div>
          <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 14 }}>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>ชื่อผู้ใช้</span>
              <input type="text" value={name} onChange={e => { setName(e.target.value); setError(''); }} onKeyDown={e => onKey(e, submitSetup)} placeholder="เช่น สมชาย" style={inputStyle} autoFocus />
            </label>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>ตำแหน่ง <span style={{ fontWeight: 400, color: '#9a958d' }}>(ไม่บังคับ)</span></span>
              <input type="text" value={position} onChange={e => setPosition(e.target.value)} onKeyDown={e => onKey(e, submitSetup)} placeholder="เช่น หัวหน้าฝ่ายสนาม" style={inputStyle} />
            </label>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>รหัส PIN (4 หลัก)</span>
              <input type="password" inputMode="numeric" maxLength={4} value={pin} onChange={e => { setPin(onlyDigits4(e.target.value)); setError(''); }} onKeyDown={e => onKey(e, submitSetup)} placeholder="••••" style={pinBoxStyle} />
            </label>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>ยืนยันรหัส PIN</span>
              <input type="password" inputMode="numeric" maxLength={4} value={pin2} onChange={e => { setPin2(onlyDigits4(e.target.value)); setError(''); }} onKeyDown={e => onKey(e, submitSetup)} placeholder="••••" style={pinBoxStyle} />
            </label>
            {!!error && <div style={{ background: '#4a2a26', border: '1px solid #d95b4a', color: '#f0b3a8', borderRadius: 6, padding: '10px 14px', fontSize: 14 }}>{error}</div>}
            <button onClick={submitSetup} style={{ background: '#e8762d', color: '#1b1d21', border: 'none', borderRadius: 8, padding: 14, fontWeight: 800, fontSize: 16, cursor: 'pointer' }}>สร้างผู้ใช้และเข้าสู่ระบบ</button>
          </div>
        </div>
      </div>
    );
  }

  if (!selected) {
    return (
      <div style={{ maxWidth: 760, margin: '0 auto', padding: '60px 20px' }}>
        <CompanyHeader />
        <div style={{ fontSize: 14, color: '#9a958d', marginBottom: 22, textAlign: 'center' }}>เลือกผู้ใช้งานเพื่อเข้าสู่ระบบ</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 14 }}>
          {admins.map(a => (
            <button key={a.name} onClick={() => { setSelected(a.name); setPin(''); setError(''); }} style={{ ...card, padding: '22px 14px', textAlign: 'center', cursor: 'pointer' }}>
              <div style={{ fontWeight: 800, fontSize: 16, color: '#e9e6e1' }}>{a.name}</div>
              {!!a.position && <div style={{ fontSize: 13, color: '#c8c3bb', marginTop: 4 }}>{a.position}</div>}
            </button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 380, margin: '0 auto', padding: '60px 20px' }}>
      <CompanyHeader />
      <div style={{ ...card, overflow: 'hidden' }}>
        <div style={{ background: '#1b1d21', padding: '16px 20px', borderBottom: '2px solid #e8762d' }}>
          <div style={{ fontSize: 18, fontWeight: 800 }}>{selected}</div>
          <div style={{ fontSize: 13, color: '#9a958d', marginTop: 2 }}>กรอกรหัส PIN เพื่อเข้าสู่ระบบ</div>
        </div>
        <div style={{ padding: '20px 24px 24px' }}>
          <PinDots length={pin.length} />
          <PinKeypad
            onDigit={d => { setPin(prev => prev.length >= 4 ? prev : prev + d); setError(''); }}
            onBackspace={() => { setPin(prev => prev.slice(0, -1)); setError(''); }}
          />
          {!!error && <div style={{ background: '#4a2a26', border: '1px solid #d95b4a', color: '#f0b3a8', borderRadius: 6, padding: '10px 14px', fontSize: 14, marginTop: 14, textAlign: 'center' }}>{error}</div>}
          <button onClick={() => { setSelected(null); setPin(''); setError(''); }} style={{ background: 'none', border: 'none', color: '#9a958d', fontSize: 13, cursor: 'pointer', padding: 4, marginTop: 14, width: '100%' }}>← เลือกชื่ออื่น</button>
        </div>
      </div>
    </div>
  );
}

function AdminAdminsTab({ admins, currentName, onAdd, onDelete, onEdit }) {
  const isOwner = admins.some(a => a.name === currentName && a.role === 'owner');
  const [addOpen, setAddOpen] = useState(false);
  const [aName, setAName] = useState('');
  const [aPosition, setAPosition] = useState('');
  const [aCanConfirm, setACanConfirm] = useState(false);
  const [aTabs, setATabs] = useState(ADMIN_TABS.map(t => t.key));
  const [aPin, setAPin] = useState('');
  const [aPin2, setAPin2] = useState('');
  const [aError, setAError] = useState('');

  const [editTarget, setEditTarget] = useState(null);
  const [eName, setEName] = useState('');
  const [ePosition, setEPosition] = useState('');
  const [eCanConfirm, setECanConfirm] = useState(false);
  const [eTabs, setETabs] = useState(ADMIN_TABS.map(t => t.key));
  const [ePin, setEPin] = useState('');
  const [ePin2, setEPin2] = useState('');
  const [eError, setEError] = useState('');

  const pinInput = { ...inputStyle, padding: '10px 12px' };
  const toggleTab = (setter) => (key) => setter(prev => prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]);

  const openAdd = () => { setAddOpen(true); setEditTarget(null); setAName(''); setAPosition(''); setACanConfirm(false); setATabs(ADMIN_TABS.map(t => t.key)); setAPin(''); setAPin2(''); setAError(''); };
  const submitAdd = async () => {

                  <div style={{ display: 'flex', gap: 6 }}>
                    {canEdit && <button onClick={() => openEdit(a)} style={{ background: 'none', border: '1px solid #4a4f58', color: '#e8762d', borderRadius: 5, padding: '6px 12px', fontSize: 12, cursor: 'pointer' }}>แก้ไข</button>}

                  </div>

                  <div className="rg-stack" style={{ display: 'grid', gridTemplateColumns: '1.6fr 1.4fr 1fr 1fr', gap: 10 }}>
                    <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                      <span style={labelStyle}>ชื่อผู้ใช้</span>
                      <input type="text" value={eName} onChange={e => { setEName(e.target.value); setEError(''); }} style={pinInput} autoFocus />
                    </label>
                    <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                      <span style={labelStyle}>ตำแหน่ง <span style={{ fontWeight: 400, color: '#9a958d' }}>(ไม่บังคับ)</span></span>
                      <input type="text" value={ePosition} onChange={e => setEPosition(e.target.value)} placeholder="เช่น หัวหน้าฝ่ายสนาม" style={pinInput} />

                    <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                      <span style={labelStyle}>PIN ใหม่ (ไม่บังคับ)</span>
                      <input type="password" inputMode="numeric" maxLength={4} value={ePin} onChange={e => { setEPin(onlyDigits4(e.target.value)); setEError(''); }} placeholder="เว้นว่างถ้าไม่เปลี่ยน" style={{ ...pinInput, textAlign: 'center', letterSpacing: 4, fontWeight: 800 }} />
                    </label>
                    <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                      <span style={labelStyle}>ยืนยัน PIN ใหม่</span>
                      <input type="password" inputMode="numeric" maxLength={4} value={ePin2} onChange={e => { setEPin2(onlyDigits4(e.target.value)); setEError(''); }} style={{ ...pinInput, textAlign: 'center', letterSpacing: 4, fontWeight: 800 }} />
                    </label>
                  </div>
                  {a.role !== 'owner' && (
                    <>
                      <label style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 12, cursor: 'pointer' }}>
                        <input type="checkbox" checked={eCanConfirm} onChange={e => setECanConfirm(e.target.checked)} style={{ width: 16, height: 16 }} />
                        <span style={{ fontSize: 13, color: '#e9e6e1' }}>สามารถยืนยันข้อมูลรายเดือนได้ (หัวหน้าฝ่ายสนาม)</span>
                      </label>
                      <div style={{ marginTop: 12 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: '#9a958d', marginBottom: 6 }}>สิทธิ์เข้าถึงแท็บ</div>
                        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                          {ADMIN_TABS.map(t => (
                            <button key={t.key} onClick={() => toggleTab(setETabs)(t.key)} style={{
                              padding: '6px 12px', borderRadius: 20, border: '1px solid ' + (eTabs.includes(t.key) ? '#6dbf5b' : '#4a4f58'),
                              background: eTabs.includes(t.key) ? '#1f3320' : '#23262b', color: eTabs.includes(t.key) ? '#6dbf5b' : '#9a958d',
                              fontSize: 12, fontWeight: 600, cursor: 'pointer'
                            }}>{t.label}{eTabs.includes(t.key) ? ' ✓' : ''}</button>
                          ))}
                        </div>
                      </div>
                    </>
                  )}
                  {!!eError && <div style={{ background: '#4a2a26', border: '1px solid #d95b4a', color: '#f0b3a8', borderRadius: 6, padding: '10px 14px', fontSize: 14, marginTop: 12 }}>{eError}</div>}
                  <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                    <button onClick={submitEdit} style={{ background: '#e8762d', color: '#1b1d21', border: 'none', borderRadius: 6, padding: '10px 20px', fontWeight: 800, fontSize: 14, cursor: 'pointer' }}>บันทึก</button>
                    <button onClick={() => setEditTarget(null)} style={{ background: 'none', border: '1px solid #4a4f58', color: '#c8c3bb', borderRadius: 6, padding: '10px 16px', fontSize: 13, cursor: 'pointer' }}>ยกเลิก</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function monthBounds(m) {
  if (!m) return [null, null];
  const [y, mm] = m.split('-').map(Number);
  return [m + '-01', m + '-' + String(new Date(y, mm, 0).getDate()).padStart(2, '0')];
}

// 'open': not locked yet, anyone can edit. 'grace': locked, only confirm-permission
// admins can edit (until the 10th of the following month). 'frozen': no one can edit.
function monthLockState(month, monthLocks) {
  if (!monthLocks.some(l => l.month === month)) return 'open';
  const [y, m] = month.split('-').map(Number);
  const ny = m === 12 ? y + 1 : y;
  const nm = m === 12 ? 1 : m + 1;
  const cutoff = ny + '-' + String(nm).padStart(2, '0') + '-10';
  const todayIso = todayLocalIso();
  return todayIso <= cutoff ? 'grace' : 'frozen';
}

function DistanceConfirmCell({ report, disabled, onConfirm }) {
  const [val, setVal] = useState(report.distanceKm ? String(report.distanceKm) : '');
  const [saving, setSaving] = useState(false);
  const changed = Number(val || 0) !== Number(report.distanceKm || 0);
  const confirm = async () => {
    if (!changed || disabled || saving) return;
    setSaving(true);
    await onConfirm(report, Number(val) || 0);
    setSaving(false);
  };
  if (report.workType === 'office') return <div style={{ fontSize: 12, color: '#9a958d' }}>-</div>;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'flex-end' }}>
      <span style={{ fontSize: 11, color: '#9a958d', whiteSpace: 'nowrap' }}>แก้ระยะทาง</span>
      <input type="number" min="0" value={val} disabled={disabled} onChange={e => setVal(e.target.value)} style={{ background: '#23262b', border: '1px solid #4a4f58', color: '#e9e6e1', borderRadius: 5, padding: '6px 8px', fontSize: 13, width: 80, textAlign: 'center' }} />
      <button onClick={confirm} disabled={disabled || !changed || saving} style={{
        background: changed && !disabled ? '#e8762d' : 'none', border: '1px solid ' + (changed && !disabled ? '#e8762d' : '#4a4f58'),
        color: changed && !disabled ? '#1b1d21' : '#9a958d', borderRadius: 5, padding: '5px 9px', fontSize: 12,
        cursor: changed && !disabled ? 'pointer' : 'default', opacity: saving ? 0.6 : 1, width: 80
      }}>{saving ? '...' : 'ยืนยัน'}</button>
    </div>
  );
}

function AdminReportsTab({ reports, leaves, workers, knownSites, onEdit, onDelete, onPrint, onExportCsv, monthLocks, canConfirmMonth, onLockMonth, onConfirmDistance }) {
  const workerLabel = (nick) => { const w = workers.find(w => w.nick === nick); return w ? w.full_name + ' (' + nick + ')' : nick; };
  const todayIso = todayLocalIso();
  const currentMonth = todayIso.slice(0, 7);
  const [filterWorker, setFilterWorker] = useState('');
  const [filterSite, setFilterSite] = useState('');
  const [filterMonth, setFilterMonth] = useState(currentMonth);
  const [includeCost, setIncludeCost] = useState(false);

  const reportMonths = [...new Set(reports.map(r => r.date.slice(0, 7)))];
  const monthOptions = [...new Set([currentMonth, ...reportMonths])].sort().reverse();
  const [monthFrom, monthTo] = monthBounds(filterMonth);
  const filterLock = filterMonth ? monthLocks.find(l => l.month === filterMonth) : null;
  const filterLockState = filterMonth ? monthLockState(filterMonth, monthLocks) : 'open';
  const canEditReport = (r) => {
    const state = monthLockState(r.date.slice(0, 7), monthLocks);
    return state === 'open' || (state === 'grace' && canConfirmMonth);
  };

  let filtered = reports.slice().sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  if (filterWorker) filtered = filtered.filter(r => r.worker === filterWorker);
  if (filterSite) filtered = filtered.filter(r => r.site.trim() === filterSite);
  if (monthFrom) filtered = filtered.filter(r => r.date >= monthFrom);
  if (monthTo) filtered = filtered.filter(r => r.date <= monthTo);

  // leaves don't have a site, so a site filter excludes them (matches the on-screen list below)
  let filteredLeaves = filterSite ? [] : leaves.slice();
  if (filterWorker) filteredLeaves = filteredLeaves.filter(l => l.worker === filterWorker);
  if (monthFrom) filteredLeaves = filteredLeaves.filter(l => l.date >= monthFrom);
  if (monthTo) filteredLeaves = filteredLeaves.filter(l => l.date <= monthTo);

  // reports merged with leave/holiday entries for the on-screen list, so admins can see
  // at a glance whether a worker was off instead of just missing from the reports
  let displayItems = [
    ...reports.map(r => ({ kind: 'report', date: r.date, worker: r.worker, sortId: r.id, report: r })),
    ...leaves.map(l => ({ kind: 'leave', date: l.date, worker: l.worker, sortId: l.id, leave: l })),
  ];
  if (filterWorker) displayItems = displayItems.filter(x => x.worker === filterWorker);
  if (filterSite) displayItems = displayItems.filter(x => x.kind === 'report' && x.report.site.trim() === filterSite);
  if (monthFrom) displayItems = displayItems.filter(x => x.date >= monthFrom);
  if (monthTo) displayItems = displayItems.filter(x => x.date <= monthTo);
  displayItems.sort((a, b) => b.date.localeCompare(a.date) || b.sortId - a.sortId);

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap', marginBottom: 18 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800 }}>รายงานรวมทุกคน</div>
          <div style={{ fontSize: 13, color: '#9a958d', marginTop: 3 }}>ทั้งหมด {filtered.length} รายการ</div>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <select value={filterWorker} onChange={e => setFilterWorker(e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }}>
            <option value="">พนักงานทุกคน</option>
            {workers.map(w => <option key={w.nick} value={w.nick}>{w.full_name} ({w.nick})</option>)}
          </select>
          <select value={filterSite} onChange={e => setFilterSite(e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }}>
            <option value="">ทุกหน่วยงาน</option>
            {knownSites.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }}>
            <option value="">ทุกเดือน</option>
            {monthOptions.map(m => {
              const [yy, mm] = m.split('-').map(Number);
              return <option key={m} value={m}>{MONTHS_TH[mm - 1]} {yy + 543}</option>;
            })}
          </select>
          <button onClick={() => { setFilterWorker(''); setFilterSite(''); setFilterMonth(currentMonth); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 6, padding: '9px 14px', fontSize: 13, cursor: 'pointer' }}>ล้าง</button>
          <button onClick={() => onExportCsv(filtered, filteredLeaves)} style={{ background: '#e8762d', border: 'none', color: '#1b1d21', borderRadius: 6, padding: '9px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>↓ Export Excel</button>
          <button onClick={() => onPrint(filtered, { filterWorker, filterSite, filterDateFrom: monthFrom, filterDateTo: monthTo, includeCost })} style={{ background: 'none', border: '1px solid #e8762d', color: '#e8762d', borderRadius: 6, padding: '9px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>🖨 พิมพ์ PDF</button>
          <label style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: '#c8c3bb', cursor: 'pointer', padding: '0 4px' }}>
            <input type="checkbox" checked={includeCost} onChange={e => setIncludeCost(e.target.checked)} style={{ width: 16, height: 16 }} />
            พิมพ์ PDF รวมค่ารถ
          </label>
        </div>
      </div>

      {!!filterMonth && (
        <div style={{ ...card, padding: '12px 16px', marginBottom: 18, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
          {filterLock ? (
            <div style={{ fontSize: 13, color: filterLockState === 'frozen' ? '#9a958d' : '#f0b98c' }}>
              🔒 ยืนยันข้อมูลเดือนนี้แล้ว โดย <b>{filterLock.locked_by}</b> เมื่อ {thDate(filterLock.locked_at.slice(0, 10))}
              {filterLockState === 'grace' && <span> — {canConfirmMonth ? 'คุณยังแก้ไขได้ถึงวันที่ 10 ของเดือนถัดไป' : 'เฉพาะหัวหน้าฝ่ายสนามแก้ไขได้ถึงวันที่ 10 ของเดือนถัดไป'}</span>}
              {filterLockState === 'frozen' && <span> — พ้นกำหนดแก้ไขแล้ว ไม่มีใครแก้ไขได้อีก</span>}
            </div>
          ) : (
            <div style={{ fontSize: 13, color: '#9a958d' }}>ยังไม่ได้ยืนยันข้อมูลเดือนนี้ — พนักงานยังแก้ไขรายงานของตัวเองได้</div>

          {canConfirmMonth && !filterLock && (

function AdminPilesTab({ reports, finishedSites, onMarkFinished, onUnmarkFinished }) {
  const [showFinished, setShowFinished] = useState(false);
  const finishedNames = new Set(finishedSites.map(f => f.site));
  const bySite = {};
  for (const r of reports) {
    for (const it of r.items) {
      const p = it.pile.trim(); if (!p) continue;
      const site = r.site.trim() || '(ไม่ระบุ)';
      bySite[site] = bySite[site] || {};
      bySite[site][p] = (bySite[site][p] || 0) + (Number(it.count) || 0);
    }
  }
  let pileSummary = Object.keys(bySite).sort().map(site => {
    const rows = Object.keys(bySite[site]).sort();
    const max = Math.max(1, ...rows.map(p => bySite[site][p]));
    let total = 0; rows.forEach(p => total += bySite[site][p]);
    return { name: site, total, finished: finishedNames.has(site), rows: rows.map(p => ({ pile: p, total: bySite[site][p], pct: Math.round(bySite[site][p] / max * 100) })) };
  });
  if (!showFinished) pileSummary = pileSummary.filter(s => !s.finished);
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>ยอดตอกสะสมรายเสา</div>
          <div style={{ fontSize: 13, color: '#9a958d' }}>แยกตามหน่วยงาน + ชนิดเสา</div>
        </div>
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, color: '#c8c3bb', cursor: 'pointer' }}>
          <input type="checkbox" checked={showFinished} onChange={e => setShowFinished(e.target.checked)} style={{ width: 16, height: 16 }} />
          แสดงไซต์ที่ตอกจบงานแล้ว
        </label>
      </div>
      {pileSummary.length === 0 && <div style={{ background: '#2c2f35', border: '1px dashed #4a4f58', borderRadius: 10, padding: '50px 20px', textAlign: 'center', color: '#9a958d', fontSize: 15 }}>ยังไม่มีข้อมูล</div>}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        {pileSummary.map(site => (
          <div key={site.name} style={{ ...card, overflow: 'hidden', opacity: site.finished ? 0.6 : 1 }}>
            <div style={{ background: '#1b1d21', padding: '12px 18px', fontWeight: 800, fontSize: 16, borderLeft: '4px solid ' + (site.finished ? '#4a4f58' : '#e8762d'), display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
              <div>{site.name} <span style={{ color: '#9a958d', fontWeight: 500, fontSize: 13 }}>— รวม {num(site.total)} ต้น</span>{site.finished && <span style={{ color: '#6dbf5b', fontWeight: 700, fontSize: 12, marginLeft: 8 }}>✓ ตอกจบงานแล้ว</span>}</div>
              {site.finished ? (
                <button onClick={() => onUnmarkFinished(site.name)} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, padding: '6px 12px', fontSize: 12, cursor: 'pointer' }}>ยกเลิกจบงาน</button>
              ) : (
                <button onClick={() => { if (confirm('ตั้ง "' + site.name + '" เป็นจบงานแล้ว? จะไม่แสดงในหน้านี้อีก (ยกเลิกได้ภายหลัง)')) onMarkFinished(site.name); }} style={{ background: 'none', border: '1px solid #6dbf5b', color: '#6dbf5b', borderRadius: 5, padding: '6px 12px', fontSize: 12, cursor: 'pointer' }}>✓ ตอกจบงานแล้ว</button>
              )}
            </div>
            <div style={{ padding: '6px 18px 14px' }}>
              {site.rows.map(row => (
                <div key={row.pile} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: '1px solid #3a3e45' }}>
                  <div style={{ fontSize: 14, minWidth: 0 }}>{row.pile}</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
                    <div style={{ width: 160, height: 8, background: '#23262b', borderRadius: 4, overflow: 'hidden' }}><div style={{ height: '100%', background: '#e8762d', width: row.pct + '%' }} /></div>
                    <div style={{ fontWeight: 800, fontSize: 16, minWidth: 70, textAlign: 'right' }}>{num(row.total)} ต้น</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminWorkersTab({ workers, reports, onSave, onDelete }) {
  const [fullName, setFullName] = useState('');
  const [nick, setNick] = useState('');
  const [editingNick, setEditingNick] = useState(null);
  const [fullClearRate, setFullClearRate] = useState(false);
  const [error, setError] = useState('');
  const [copied, setCopied] = useState(null);

  const linkFor = (nick) => location.origin + location.pathname + '?user=' + nick;
  const copyLink = (nick) => {
    navigator.clipboard && navigator.clipboard.writeText(linkFor(nick));
    setCopied(nick);
    setTimeout(() => setCopied(null), 1500);
  };
  const copyAllLinks = () => {
    const text = workers.map(w => w.full_name + ' (' + w.nick + '): ' + linkFor(w.nick)).join('\n');
    navigator.clipboard && navigator.clipboard.writeText(text);
    setCopied('__all__');
    setTimeout(() => setCopied(null), 1500);
  };

  const save = () => {
    const full = fullName.trim(), n = nick.trim();
    if (!full || !n) return setError('กรุณากรอกชื่อ-นามสกุล และชื่อเล่น');
    const dup = workers.some(w => w.nick === n && n !== editingNick);
    if (dup) return setError('ชื่อเล่น "' + n + '" มีอยู่แล้ว กรุณาใช้ชื่ออื่น');
    onSave({ fullName: full, nick: n, editingNick, fullClearRate });
    setFullName(''); setNick(''); setEditingNick(null); setFullClearRate(false); setError('');
  };
  const cancel = () => { setFullName(''); setNick(''); setEditingNick(null); setFullClearRate(false); setError(''); };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>จัดการรายชื่อพนักงาน</div>
          <div style={{ fontSize: 13, color: '#9a958d' }}>ทั้งหมด {workers.length} คน · ชื่อเล่นใช้เป็นลิงก์ประจำตัว (?user=ชื่อเล่น)</div>
        </div>
        {workers.length > 0 && (
          <button onClick={copyAllLinks} style={{ background: '#e8762d', border: 'none', color: '#1b1d21', borderRadius: 6, padding: '9px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>
            {copied === '__all__' ? 'คัดลอกแล้ว ✓' : '↓ คัดลอกลิงก์ทั้งหมด'}
          </button>
        )}
      </div>

      <div style={{ ...card, padding: '16px 18px', marginBottom: 18 }}>
        <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 12, color: '#e8762d' }}>{editingNick ? 'แก้ไขพนักงาน: ' + editingNick : 'เพิ่มพนักงานใหม่'}</div>
        <div className="rg-stack" style={{ display: 'grid', gridTemplateColumns: '2fr 1fr auto auto', gap: 10, alignItems: 'end' }}>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <span style={labelStyle}>ชื่อ-นามสกุล</span>
            <input type="text" value={fullName} onChange={e => { setFullName(e.target.value); setError(''); }} placeholder="เช่น นายสมชาย ใจดี" style={inputStyle} />
          </label>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <span style={labelStyle}>ชื่อเล่น</span>
            <input type="text" value={nick} onChange={e => { setNick(e.target.value); setError(''); }} placeholder="เช่น ชาย" style={inputStyle} />
          </label>
          <button onClick={save} style={{ background: '#e8762d', color: '#1b1d21', border: 'none', borderRadius: 6, padding: '12px 20px', fontWeight: 800, fontSize: 14, cursor: 'pointer' }}>{editingNick ? 'บันทึก' : '+ เพิ่ม'}</button>
          {editingNick && <button onClick={cancel} style={{ background: 'none', border: '1px solid #4a4f58', color: '#c8c3bb', borderRadius: 6, padding: '12px 16px', fontSize: 13, cursor: 'pointer' }}>ยกเลิก</button>}
        </div>
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 12, fontSize: 13, color: '#c8c3bb', cursor: 'pointer' }}>
          <input type="checkbox" checked={fullClearRate} onChange={e => setFullClearRate(e.target.checked)} />
          ได้ค่าเคลียร์พื้นที่หน้างานเต็ม 100% (หัวหน้าดูแลหน้างานโดยตรง)
        </label>
        {!!error && <div style={{ background: '#4a2a26', border: '1px solid #d95b4a', color: '#f0b3a8', borderRadius: 6, padding: '10px 14px', fontSize: 14, marginTop: 12 }}>{error}</div>}
      </div>

      <div style={{ ...card, overflow: 'hidden' }}>
        {workers.map(w => (
          <div key={w.nick} style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 12, padding: '12px 18px', borderBottom: '1px solid #3a3e45', alignItems: 'center' }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontWeight: 700, fontSize: 15 }}>{w.full_name} <span style={{ color: '#e8762d', fontWeight: 600, fontSize: 13 }}>({w.nick})</span></div>
              <div style={{ fontSize: 12, color: '#9a958d' }}>มีรายงาน {reports.filter(r => r.worker === w.nick).length} รายการ{w.full_clear_rate ? ' · ค่าเคลียร์พื้นที่ 100%' : ''}</div>
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              <button onClick={() => copyLink(w.nick)} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, padding: '6px 12px', fontSize: 12, cursor: 'pointer' }}>{copied === w.nick ? 'คัดลอกแล้ว ✓' : 'คัดลอกลิงก์'}</button>
              <button onClick={() => { setFullName(w.full_name); setNick(w.nick); setEditingNick(w.nick); setFullClearRate(!!w.full_clear_rate); setError(''); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#e8762d', borderRadius: 5, padding: '6px 12px', fontSize: 12, cursor: 'pointer' }}>แก้ไข</button>
              <button onClick={() => {
                const n = reports.filter(r => r.worker === w.nick).length;
                const msg = n > 0 ? 'ลบ ' + w.nick + '? (รายงานเดิม ' + n + ' รายการจะยังอยู่ในระบบ)' : 'ลบ ' + w.nick + '?';
                if (confirm(msg)) onDelete(w.nick);
              }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, padding: '6px 12px', fontSize: 12, cursor: 'pointer' }}>ลบ</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminMonthlyTab({ workers, reports, rates, onPrint }) {
  const [month, setMonth] = useState(todayLocalMonth());
  const monReports = reports.filter(r => r.date.slice(0, 7) === month);
  const rows = workers.map(w => {
    const mine = monReports.filter(r => r.worker === w.nick);
    if (!mine.length) return null;
    const byDate = {};
    for (const r of mine) if (!byDate[r.date]) byDate[r.date] = r;
    const days = Object.keys(byDate).length;
    let money = 0;
    for (const d of Object.keys(byDate)) money += wearRate(byDate[d].vehicle, rates, byDate[d].workType) + fieldMoney(byDate[d]);
    const agg = {}; let total = 0;
    for (const r of mine) for (const it of r.items) {
      const k = r.site + '||' + it.pile;
      agg[k] = (agg[k] || 0) + (Number(it.count) || 0);
      total += Number(it.count) || 0;
    }
    return { nick: w.nick, fullName: w.full_name, days, total, money, rows: Object.keys(agg).sort().map(k => { const [site, pile] = k.split('||'); return { site, pile, count: agg[k] }; }) };
  }).filter(Boolean);
  const [y, m] = month.split('-').map(Number);
  const monthTh = MONTHS_TH[m - 1] + ' ' + (y + 543);

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap', marginBottom: 18 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800 }}>สรุปรายเดือนต่อพนักงาน</div>
          <div style={{ fontSize: 13, color: '#9a958d', marginTop: 3 }}>เดือน {monthTh}</div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <input type="month" value={month} onChange={e => setMonth(e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }} />
          <button onClick={() => onPrint(rows, monthTh)} style={{ background: 'none', border: '1px solid #e8762d', color: '#e8762d', borderRadius: 6, padding: '9px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>🖨 พิมพ์ PDF</button>
        </div>
      </div>
      {rows.length === 0 && <div style={{ background: '#2c2f35', border: '1px dashed #4a4f58', borderRadius: 10, padding: '50px 20px', textAlign: 'center', color: '#9a958d', fontSize: 15 }}>ไม่มีรายงานในเดือนนี้</div>}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {rows.map(m => (
          <div key={m.nick} style={{ ...card, overflow: 'hidden' }}>
            <div style={{ background: '#1b1d21', padding: '12px 18px', borderLeft: '4px solid #e8762d', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
              <div style={{ fontWeight: 800, fontSize: 16 }}>{m.nick} <span style={{ color: '#9a958d', fontWeight: 500, fontSize: 13 }}>{m.fullName}</span></div>
              <div style={{ display: 'flex', gap: 18, fontSize: 13, color: '#c8c3bb', flexWrap: 'wrap' }}>
                <span>ทำงาน <b style={{ color: '#e9e6e1' }}>{m.days}</b> วัน</span>
                <span>ตอกรวม <b style={{ color: '#f0b98c', fontSize: 15 }}>{num(m.total)}</b> ต้น</span>
                <span>ค่ารถ <b style={{ color: '#f0b98c' }}>{num(m.money)}</b> บาท</span>
              </div>
            </div>
            <div style={{ padding: '6px 18px 12px' }}>
              {m.rows.map((row, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', gap: 12, padding: '8px 0', borderBottom: '1px dotted #3a3e45', fontSize: 13 }}>
                  <span style={{ minWidth: 0, color: '#c8c3bb' }}>{row.site} — {row.pile}</span>
                  <span style={{ fontWeight: 700, whiteSpace: 'nowrap' }}>{num(row.count)} ต้น</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminCarTab({ workers, reports, rates, onSetRates, onPrint }) {
  const [month, setMonth] = useState(todayLocalMonth());
  const monthReports = reports.filter(r => r.date.slice(0, 7) === month);
  const rows = workers.map(w => {
    const byDate = {};
    for (const r of monthReports) if (r.worker === w.nick && !byDate[r.date]) byDate[r.date] = r;
    const dates = Object.keys(byDate);
    let wear = 0, field = 0, toll = 0;
    for (const d of dates) { wear += wearRate(byDate[d].vehicle, rates, byDate[d].workType); field += fieldMoney(byDate[d]); toll += Number(byDate[d].tollFee) || 0; }
    return { nick: w.nick, fullName: w.full_name, days: dates.length, wear, field, toll, money: wear + field };
  }).filter(c => c.days > 0);
  const grandTotal = rows.reduce((a, c) => a + c.money, 0);
  const [y, m] = month.split('-').map(Number);
  const monthTh = MONTHS_TH[m - 1] + ' ' + (y + 543);

  return (

function AdminLeavesTab({ workers, leaves, onDelete }) {
  const workerLabel = (nick) => { const w = workers.find(w => w.nick === nick); return w ? w.full_name + ' (' + nick + ')' : nick; };
  const currentMonth = todayLocalMonth();
  const [filterWorker, setFilterWorker] = useState('');
  const [filterMonth, setFilterMonth] = useState(currentMonth);

  const leaveMonths = [...new Set(leaves.map(l => l.date.slice(0, 7)))];
  const monthOptions = [...new Set([currentMonth, ...leaveMonths])].sort().reverse();
  const [monthFrom, monthTo] = monthBounds(filterMonth);

  let filtered = leaves.slice().sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  if (filterWorker) filtered = filtered.filter(l => l.worker === filterWorker);
  if (monthFrom) filtered = filtered.filter(l => l.date >= monthFrom);
  if (monthTo) filtered = filtered.filter(l => l.date <= monthTo);

  const exportLeavesCsv = () => {
    const rows = [['วันที่', 'พนักงาน', 'ประเภท', 'หมายเหตุการสลับวันหยุด', 'เหตุผล']];
    for (const l of filtered) rows.push([l.date, workerLabel(l.worker), leaveTypeTh(l.leaveType), sundaySwapNote(l.leaveType, l.date) || '', l.reason || '']);
    downloadXlsx(rows, 'วันหยุดพนักงาน.xlsx', 'วันหยุด');
  };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap', marginBottom: 18 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800 }}>วันหยุดพนักงาน</div>
          <div style={{ fontSize: 13, color: '#9a958d', marginTop: 3 }}>ทั้งหมด {filtered.length} รายการ</div>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <select value={filterWorker} onChange={e => setFilterWorker(e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }}>
            <option value="">พนักงานทุกคน</option>
            {workers.map(w => <option key={w.nick} value={w.nick}>{w.full_name} ({w.nick})</option>)}
          </select>
          <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }}>
            <option value="">ทุกเดือน</option>
            {monthOptions.map(m => {
              const [yy, mm] = m.split('-').map(Number);
              return <option key={m} value={m}>{MONTHS_TH[mm - 1]} {yy + 543}</option>;
            })}
          </select>
          <button onClick={() => { setFilterWorker(''); setFilterMonth(currentMonth); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 6, padding: '9px 14px', fontSize: 13, cursor: 'pointer' }}>ล้าง</button>
          <button onClick={exportLeavesCsv} style={{ background: '#e8762d', border: 'none', color: '#1b1d21', borderRadius: 6, padding: '9px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>↓ Export Excel</button>
        </div>
      </div>

      {filtered.length === 0 && <div style={{ background: '#2c2f35', border: '1px dashed #4a4f58', borderRadius: 10, padding: '50px 20px', textAlign: 'center', color: '#9a958d', fontSize: 15 }}>ไม่มีข้อมูลวันหยุด/ลาในช่วงที่เลือก</div>}

      <div style={{ ...card, overflow: 'hidden' }}>
        {filtered.map(l => (
          <div key={l.id} className="rg-stack" style={{ display: 'grid', gridTemplateColumns: '110px 100px 1fr auto', gap: 14, padding: '12px 18px', borderBottom: '1px solid #3a3e45', alignItems: 'center' }}>
            <div style={{ fontSize: 13, color: '#9a958d' }}>{thDate(l.date)}</div>
            <div style={{ fontWeight: 800, fontSize: 14, color: '#e8762d' }}>{workerLabel(l.worker)}</div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 600 }}>{leaveTypeTh(l.leaveType)}</div>
              {!!sundaySwapNote(l.leaveType, l.date) && <div style={{ fontSize: 12, color: '#f0b98c', marginTop: 2 }}>⚠ {sundaySwapNote(l.leaveType, l.date)}</div>}
              {!!l.reason && <div style={{ fontSize: 12, color: '#c8c3bb', marginTop: 2, fontStyle: 'italic' }}>📝 {l.reason}</div>}
            </div>
            <button onClick={() => { if (confirm('ลบวันหยุด/ลาของ ' + l.worker + ' วันที่ ' + thDate(l.date) + '?')) onDelete(l.id); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, padding: '6px 10px', fontSize: 12, cursor: 'pointer' }}>ลบ</button>
          </div>
        ))}
      </div>
    </div>
  );
}

// writes a real .xlsx (not .csv) so column widths can auto-fit the content —
// CSV has no way to carry column-width info, which is why Excel falls back to
// a fixed default width and shows "######" for anything that doesn't fit
function downloadXlsx(rows, filename, sheetName, merges) {
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const cols = [];
  for (let c = 0; c < (rows[0] ? rows[0].length : 0); c++) {
    let maxLen = 8;
    for (const row of rows) {
      const len = row[c] == null ? 0 : String(row[c]).length;
      if (len > maxLen) maxLen = len;
    }
    cols.push({ wch: maxLen + 2 });
  }
  ws['!cols'] = cols;
  if (merges && merges.length) ws['!merges'] = merges;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName || 'Sheet1');
  XLSX.writeFile(wb, filename);
}

// mirrors PrintReportsView's own rows/totals (rowSpan/isFirst already computed there) into a
// downloadable .xlsx with the same merged-cell layout, instead of recomputing from raw reports
function exportPrintReportsXlsx(rows, totals, includeCost, subtitle) {
  const header = ['วันที่', 'พนักงาน', 'หน่วยงาน', 'ชนิดเสา / ลักษณะงาน', 'จำนวน', 'สะสม', 'เวลา', 'รถ / ระยะทาง'];
  if (includeCost) header.push('ค่าสึกหรอ', 'ค่าออกสนาม', 'รวม', 'ค่าทางด่วน');
  const out = [[subtitle], header];
  const merges = [];
  let rIdx = 2; // row 0 subtitle, row 1 header
  for (const p of rows) {
    const row = [p.isFirst ? p.dateTh : '', p.isFirst ? p.nick : '', p.isFirst ? p.site : '', p.pile, p.count, p.cum, p.isFirst ? p.time : '', p.isFirst ? p.vehicle : ''];
    if (includeCost) row.push(p.isFirst ? p.wear : '', p.isFirst ? p.field : '', p.isFirst ? p.money : '', p.isFirst ? p.toll : '');
    out.push(row);
    if (p.isFirst && p.rowSpan > 1) {
      const mergeCols = includeCost ? [0, 1, 2, 6, 7, 8, 9, 10, 11] : [0, 1, 2, 6, 7];
      for (const c of mergeCols) merges.push({ s: { r: rIdx, c }, e: { r: rIdx + p.rowSpan - 1, c } });
    }
    rIdx++;
  }
  merges.push({ s: { r: 0, c: 0 }, e: { r: 0, c: header.length - 1 } });
  if (includeCost && totals) {
    out.push([]);
    out.push(['ออกสนาม (วัน)', 'ระยะทางไป-กลับรวม (กม.)', 'ค่าสึกหรอ (บาท)', 'ค่าออกสนาม (บาท)', 'รวม (บาท)', 'รวมค่าทางด่วน (บาท)']);
    out.push([totals.fieldDays, totals.distanceRoundTrip, totals.wear, totals.field, totals.money, totals.toll]);
  }
  downloadXlsx(out, 'รายงานตอกเสาเข็ม.xlsx', 'รายงาน', merges);
}

function exportCsv(filtered, reports, rates, leaves = [], workers = []) {
  const workerLabel = (nick) => { const w = workers.find(w => w.nick === nick); return w ? w.full_name + ' (' + nick + ')' : nick; };
  const rows = [['วันที่', 'พนักงาน', 'หน่วยงาน', 'ลักษณะงาน', 'ชนิดเสา', 'จำนวนตอก', 'ยอดสะสม', 'เวลาเข้า', 'เวลาออก', 'รถที่ใช้', 'ระยะทาง(กม.)', 'ระยะทางไป-กลับ(กม.)', 'ค่าสึกหรอ', 'ค่าออกสนาม', 'ค่าทางด่วน', 'หมายเหตุ']];
  const wtTh = w => w === 'clear' ? 'เคลียร์พื้นที่' : w === 'none' ? 'ไปแต่ไม่ได้ตอก' : w === 'office' ? 'อยู่บริษัท' : w === 'office_errand' ? 'อยู่บริษัท (ถูกใช้งานไปที่อื่น)' : 'ตอกเสาเข็ม';
  const dataRows = [];
  for (const r of filtered) {
    const base = [r.date, workerLabel(r.worker), r.site, wtTh(r.workType)];
    const tail = [r.timeIn, r.timeOut, vehicleTh(r.vehicle), r.distanceKm || '', r.distanceKm ? r.distanceKm * 2 : '', wearRate(r.vehicle, rates, r.workType), fieldMoney(r), Number(r.tollFee) || 0, r.note || ''];
    if (r.items.length) for (const it of r.items) dataRows.push({ date: r.date, sortId: r.id, row: [...base, it.pile, it.count, cumFor(reports, r.site, it.pile, r.date, null), ...tail] });
    else dataRows.push({ date: r.date, sortId: r.id, row: [...base, '', '', '', ...tail] });
  }
  for (const l of leaves) {
    const note = [sundaySwapNote(l.leaveType, l.date), l.reason].filter(Boolean).join(' / ');
    dataRows.push({ date: l.date, sortId: l.id, row: [l.date, workerLabel(l.worker), '', leaveTypeTh(l.leaveType), '', '', '', '', '', '', '', '', 0, 0, 0, note] });
  }
  dataRows.sort((a, b) => a.date.localeCompare(b.date) || a.sortId - b.sortId);
  for (const d of dataRows) rows.push(d.row);
  downloadXlsx(rows, 'รายงานตอกเสาเข็ม.xlsx', 'รายงาน');
}

    };

  };
  const deleteReport = async (id) => {

  const saveLeave = async (leave) => {

  const workerLabel = (nick) => { const w = workers.find(w => w.nick === nick); return w ? w.full_name + ' (' + nick + ')' : nick; };
  const openPrintReports = (filtered, filters) => {
    const sorted = [...filtered].sort((a, b) => a.date.localeCompare(b.date) || a.id - b.id);

      const wear = wearRate(r.vehicle, rates, r.workType), field = fieldMoney(r), toll = Number(r.tollFee) || 0;

      // time/vehicle/money) are only rendered on the first row and merged (rowSpan) across the rest
      return r.items.map((it, idx) => ({ ...base, pile: it.pile, count: num(it.count), cum: num(cumFor(reports, r.site, it.pile, r.date, null)), rowSpan: r.items.length, isFirst: idx === 0 }));

    const subtitle = [filters.filterWorker && ('พนักงาน: ' + workerLabel(filters.filterWorker)), filters.filterSite && ('หน่วยงาน: ' + filters.filterSite),

      .filter(Boolean).join(' · ') || ('ทั้งหมด ' + filtered.length + ' รายการ');
    // one report per worker+date counted toward the money totals (a worker only submits once per day)
    const byWorkerDate = {};
    for (const r of filtered) { const k = r.worker + '|' + r.date; if (!byWorkerDate[k]) byWorkerDate[k] = r; }
    let wear = 0, field = 0, toll = 0, distanceRoundTrip = 0, fieldDays = 0;
    for (const k of Object.keys(byWorkerDate)) {
      const fm = fieldMoney(byWorkerDate[k]);
      wear += wearRate(byWorkerDate[k].vehicle, rates, byWorkerDate[k].workType);
      field += fm;
      toll += Number(byWorkerDate[k].tollFee) || 0;
      distanceRoundTrip += (Number(byWorkerDate[k].distanceKm) || 0) * 2; // ไป-กลับ, display only — money still uses one-way (ขาไป)
      if (fm > 0) fieldDays++;
    }
    setPrintPayload({ kind: 'reports', rows, subtitle, includeCost: !!filters.includeCost, totals: { wear, field, toll, money: wear + field, distanceRoundTrip, fieldDays } });
  };
  const openPrintMonthly = (rows, monthTh) => setPrintPayload({ kind: 'monthly', rows: rows.map(r => ({ ...r, total: r.total })), monthTh });
  const openPrintCar = (rows, grandTotal, monthTh) => setPrintPayload({ kind: 'car', rows, grandTotal, monthTh });

  if (loading) return null; // loading-overlay in the DOM handles this
  if (loadError) return <div style={{ padding: 40, color: '#f0b3a8' }}>{loadError}</div>;

  if (printPayload) {
    if (printPayload.kind === 'reports') return <PrintReportsView rows={printPayload.rows} subtitle={printPayload.subtitle} totals={printPayload.totals} includeCost={printPayload.includeCost} onClose={() => setPrintPayload(null)} />;
    if (printPayload.kind === 'monthly') return <PrintMonthlyView rows={printPayload.rows} monthTh={printPayload.monthTh} onClose={() => setPrintPayload(null)} />;
    if (printPayload.kind === 'car') return <PrintCarView rows={printPayload.rows} grandTotal={printPayload.grandTotal} monthTh={printPayload.monthTh} onClose={() => setPrintPayload(null)} />;
  }

  const myAllowedTabs = allowedTabKeysFor(admins.find(a => a.name === adminName));
  const effectiveTab = (myAllowedTabs.includes(tab) || tab === 'admins') ? tab : (myAllowedTabs[0] || 'reports');

  return (
    <div style={{ minHeight: '100vh', background: '#23262b', color: '#e9e6e1' }}>
      {!(view === 'admin' && !adminAuthed) && (
        <TopBar view={view} worker={worker} workerFull={workerRec ? (workerRec.full_name + ' (' + workerRec.nick + ')') : ''} tab={effectiveTab}
          onHome={() => setView('admin')} onAdminTab={setTab} onLogout={logoutAdmin} allowedTabKeys={myAllowedTabs} />
      )}

      {view === 'form' && (
        <WorkerFormView
          worker={worker} workerFull={workerRec ? (workerRec.full_name + ' (' + workerRec.nick + ')') : worker}
          reports={reports} rates={rates} knownSites={knownSites} knownPiles={knownPiles}
          editingReport={editingReport} onCancelEdit={() => { setEditingReport(null); setEditingAsAdmin(false); }}
          onSave={saveReport} onDelete={deleteReport} onEdit={r => { setEditingReport(r); setEditingAsAdmin(false); }}
          leaves={leaves} onSaveLeave={saveLeave} onDeleteLeave={deleteLeave}
          monthLocks={monthLocks} fullClearRate={!!(workerRec && workerRec.full_clear_rate)}
        />
      )}

      {view === 'admin' && !adminAuthed && (
        <AdminLoginView admins={admins} onSetup={setupAdmin} onLogin={loginAdmin} />
      )}

      {view === 'admin' && adminAuthed && (
        <div style={{ maxWidth: 1100, margin: '0 auto', padding: '28px 20px 80px' }}>
          {effectiveTab === 'reports' && <AdminReportsTab reports={reports} leaves={leaves} workers={workers} knownSites={knownSites} onEdit={r => { setEditingReport(r); setEditingAsAdmin(true); setWorker(r.worker); setView('form'); }} onDelete={deleteReport} onPrint={openPrintReports} onExportCsv={doExportCsv} monthLocks={monthLocks} canConfirmMonth={!!(admins.find(a => a.name === adminName) || {}).canConfirmMonth} onLockMonth={lockMonth} onConfirmDistance={confirmDistance} />}
          {effectiveTab === 'piles' && <AdminPilesTab reports={reports} finishedSites={finishedSites} onMarkFinished={markSiteFinished} onUnmarkFinished={unmarkSiteFinished} />}
          {effectiveTab === 'monthly' && <AdminMonthlyTab workers={workers} reports={reports} rates={rates} onPrint={openPrintMonthly} />}
          {effectiveTab === 'car' && <AdminCarTab workers={workers} reports={reports} rates={rates} onSetRates={setRatesRemote} onPrint={openPrintCar} />}
          {effectiveTab === 'leaves' && <AdminLeavesTab workers={workers} leaves={leaves} onDelete={deleteLeave} />}
          {effectiveTab === 'workers' && <AdminWorkersTab workers={workers} reports={reports} onSave={saveWorker} onDelete={deleteWorker} />}
          {effectiveTab === 'admins' && <AdminAdminsTab admins={admins} currentName={adminName} onAdd={addAdmin} onDelete={deleteAdmin} onEdit={editAdmin} />}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
