<script type="text/babel" data-presets="react">

const MONTHS_TH_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

const VEHICLES = [
  { key: 'company', label: 'รถบริษัท', sub: 'ไม่คิดค่าสึกหรอ' },

];
const WORK_TYPES = [

  { key: 'clear', label: 'เคลียร์พื้นที่หน้างาน', sub: 'ค่าออกสนาม 50%' },

];

function fieldRate(km) {
  km = Number(km) || 0;
  if (km <= 0) return 0;
  if (km <= 80) return 70;
  if (km <= 100) return 120;
  if (km <= 150) return 170;
  return 220;
}
function fieldFactor(workType) { return workType === 'clear' ? 0.5 : workType === 'none' ? 0 : 1; }
function fieldMoney(r) { return fieldRate(r.distanceKm) * fieldFactor(r.workType || 'pile'); }
function wearRate(vehicle, rates) { return vehicle === 'car' ? (Number(rates.car) || 0) : vehicle === 'moto' ? (Number(rates.moto) || 0) : 0; }
function vehicleTh(k) { const v = VEHICLES.find(v => v.key === k); return v ? v.label : k; }
function num(n) { return (Number(n) || 0).toLocaleString('th-TH'); }

function thDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  return d + ' ' + MONTHS_TH_SHORT[m - 1] + ' ' + (y + 543);
}

function haversineKm(a, b) {
  const R = 6371, rad = x => x * Math.PI / 180;
  const dLat = rad(b.lat - a.lat), dLng = rad(b.lng - a.lng);
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(rad(a.lat)) * Math.cos(rad(b.lat)) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

// cumulative count for site+pile, over reports up to (and optionally excluding) a report id
function cumFor(reports, site, pile, uptoDate, excludeId) {
  let sum = 0;
  for (const r of reports) {
    if ((r.site || '').trim() !== (site || '').trim()) continue;
    if (excludeId && r.id === excludeId) continue;
    if (uptoDate && r.date > uptoDate) continue;
    for (const it of r.items) if ((it.pile || '').trim() === (pile || '').trim()) sum += Number(it.count) || 0;
  }
  return sum;
}

async function sha256Hex(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

    setError(''); setSavedFlash(true);
    setF(blank);

  const getPosition = (cb) => {
    if (!navigator.geolocation) return setGeoMsg('เบราว์เซอร์นี้ไม่รองรับการหาตำแหน่ง');

                              ยอดสะสม <b>{pileShort}</b> @ {f.site}: เดิม {num(prevCum)} + วันนี้ {num(cnt)} = <b style={{ fontSize: 15 }}>{num(prevCum + cnt)}</b> ต้น
                            </div>
                          )}
                        </div>
                        <button onClick={() => removeItem(i)} title="ลบรายการ" style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, width: 32, height: 32, cursor: 'pointer', fontSize: 15, flexShrink: 0 }}>✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
              <datalist id="pile-list">{knownPiles.map(p => <option key={p} value={p} />)}</datalist>
              <button onClick={addItem} style={{ marginTop: 10, background: 'none', border: '1px dashed #e8762d', color: '#e8762d', borderRadius: 6, padding: '10px 16px', fontWeight: 700, fontSize: 14, cursor: 'pointer', width: '100%' }}>+ เพิ่มรายการเสา</button>
            </div>
          )}

            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>เวลาเข้างาน</span>
              <input type="time" value={f.timeIn} onChange={e => setF(s => ({ ...s, timeIn: e.target.value }))} style={inputStyle} />
            </label>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>เวลาออกงาน</span>
              <input type="time" value={f.timeOut} onChange={e => setF(s => ({ ...s, timeOut: e.target.value }))} style={inputStyle} />
            </label>
          </div>

          <div>
            <div style={{ ...labelStyle, marginBottom: 8 }}>ระยะทางไปหน้างาน (กม.)</div>
            <div style={{ display: 'grid', gridTemplateColumns: '110px 1fr', gap: 10, alignItems: 'stretch' }}>
              <input type="number" min="0" value={f.distanceKm} onChange={e => setF(s => ({ ...s, distanceKm: e.target.value }))} placeholder="กม." style={{ ...inputStyle, fontWeight: 700, textAlign: 'center' }} />
              <button onClick={locateAndFill} disabled={locating} style={{ background: '#2c4a2a', border: '1px solid #6dbf5b', color: '#b9e6ae', borderRadius: 6, padding: '10px 14px', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>
                {locating ? '⏳ กำลังหาตำแหน่ง...' : '📍 คำนวณจากตำแหน่งปัจจุบัน'}
              </button>
            </div>
            {!!geoMsg && <div style={{ fontSize: 13, color: '#f0b98c', marginTop: 8 }}>{geoMsg}</div>}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 8, flexWrap: 'wrap' }}>
              <span style={{ fontSize: 12, color: '#9a958d' }}>{home ? '✓ ตั้งตำแหน่งบ้านแล้ว' : 'ยังไม่ได้ตั้งตำแหน่งบ้าน'}</span>
              <button onClick={setHomeHere} style={{ background: 'none', border: 'none', color: '#e8762d', fontSize: 12, cursor: 'pointer', padding: 0, textDecoration: 'underline' }}>{home ? 'ตั้งใหม่' : 'ตั้งตำแหน่งบ้าน (กดขณะอยู่บ้าน)'}</button>
            </div>
            {fieldPreviewVal > 0 && <div style={{ fontSize: 13, background: '#1b1d21', borderRadius: 6, padding: '10px 14px', color: '#f0b98c', marginTop: 10 }}>ค่าออกสนามวันนี้: <b style={{ fontSize: 16 }}>{num(fieldPreviewVal)}</b> บาท</div>}
          </div>

          <div>
            <div style={{ ...labelStyle, marginBottom: 8 }}>รถที่ใช้เดินทาง (สำหรับคิดค่าสึกหรอ)</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
              {VEHICLES.map(v => <PickerButton key={v.key} active={f.vehicle === v.key} label={v.label} sub={v.sub} onClick={() => setF(s => ({ ...s, vehicle: v.key }))} />)}
            </div>
          </div>

          <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <span style={labelStyle}>หมายเหตุ <span style={{ fontWeight: 400, color: '#9a958d' }}>(ไม่บังคับ)</span></span>
            <textarea value={f.note} onChange={e => setF(s => ({ ...s, note: e.target.value }))} rows="2" placeholder="เช่น ฝนตกช่วงบ่าย หยุดตอกชั่วคราว" style={{ ...inputStyle, resize: 'vertical' }} />
          </label>

          {!!error && <div style={{ background: '#4a2a26', border: '1px solid #d95b4a', color: '#f0b3a8', borderRadius: 6, padding: '10px 14px', fontSize: 14 }}>{error}</div>}

          <button onClick={submit} style={{ background: '#e8762d', color: '#1b1d21', border: 'none', borderRadius: 8, padding: 16, fontWeight: 800, fontSize: 17, cursor: 'pointer', marginTop: 4 }}>
            {editingReport ? 'บันทึกการแก้ไข' : 'บันทึกรายงาน'}
          </button>
        </div>
      </div>

      {mine.length > 0 && (
        <div style={{ marginTop: 28 }}>
          <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 10, color: '#c8c3bb' }}>รายงานล่าสุดของฉัน</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {mine.map(r => (
              <div key={r.id} style={{ ...card, padding: '12px 14px', display: 'flex', justifyContent: 'space-between', gap: 10, alignItems: 'flex-start' }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, color: '#e8762d', fontWeight: 700 }}>{thDate(r.date)} · {r.site}</div>
                  <div style={{ fontSize: 13, color: '#c8c3bb', marginTop: 3 }}>{r.items.length ? r.items.map(i => i.pile + ' × ' + i.count + ' ต้น').join(' · ') : (r.workType === 'clear' ? 'เคลียร์พื้นที่หน้างาน' : 'ไปหน้างานแต่ไม่ได้ตอก')}</div>
                  <div style={{ fontSize: 12, color: '#9a958d', marginTop: 3 }}>{r.timeIn}–{r.timeOut} น. · {vehicleTh(r.vehicle)}</div>
                  {!!r.note && <div style={{ fontSize: 12, color: '#c8c3bb', marginTop: 3, fontStyle: 'italic' }}>📝 {r.note}</div>}
                </div>
                <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>
                  <button onClick={() => onEdit(r)} style={{ background: 'none', border: '1px solid #4a4f58', color: '#e8762d', borderRadius: 5, padding: '5px 9px', fontSize: 12, cursor: 'pointer' }}>แก้ไข</button>
                  <button onClick={() => { if (confirm('ลบรายงานนี้?')) onDelete(r.id); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, padding: '5px 9px', fontSize: 12, cursor: 'pointer' }}>ลบ</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function AdminLoginView({ admins, onSetup, onLogin }) {
  const firstUse = admins.length === 0;
  const [name, setName] = useState('');
  const [pw, setPw] = useState('');
  const [pw2, setPw2] = useState('');
  const [error, setError] = useState('');

  const submitSetup = async () => {
    if (!name.trim()) return setError('กรุณากรอกชื่อผู้ดูแล');
    if (pw.length < 4) return setError('รหัสผ่านอย่างน้อย 4 ตัวอักษร');
    if (pw !== pw2) return setError('รหัสผ่านไม่ตรงกัน');
    await onSetup(name.trim(), pw);
  };
  const submitLogin = async () => {
    const ok = await onLogin(name.trim(), pw);
    if (!ok) setError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
  };
  const submit = firstUse ? submitSetup : submitLogin;
  const onKey = (e) => { if (e.key === 'Enter') submit(); };

  return (
    <div style={{ maxWidth: 380, margin: '0 auto', padding: '60px 20px' }}>
      <div style={{ ...card, overflow: 'hidden' }}>
        <div style={{ background: '#1b1d21', padding: '16px 20px', borderBottom: '2px solid #e8762d' }}>
          <div style={{ fontSize: 18, fontWeight: 800 }}>{firstUse ? 'ตั้งค่าผู้ดูแลคนแรก' : 'เข้าสู่หน้าแอดมิน'}</div>
          <div style={{ fontSize: 13, color: '#9a958d', marginTop: 2 }}>{firstUse ? 'ยังไม่มีผู้ดูแล — สร้างบัญชีแรกที่นี่' : 'สำหรับส่วนกลางเท่านั้น'}</div>
        </div>
        <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 14 }}>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <span style={labelStyle}>ชื่อผู้ดูแล</span>
            <input type="text" value={name} onChange={e => { setName(e.target.value); setError(''); }} onKeyDown={onKey} placeholder="เช่น แอดมิน" style={inputStyle} autoFocus />
          </label>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <span style={labelStyle}>รหัสผ่าน</span>
            <input type="password" value={pw} onChange={e => { setPw(e.target.value); setError(''); }} onKeyDown={onKey} placeholder="กรอกรหัสผ่าน" style={inputStyle} />
          </label>
          {firstUse && (
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>ยืนยันรหัสผ่าน</span>
              <input type="password" value={pw2} onChange={e => { setPw2(e.target.value); setError(''); }} onKeyDown={onKey} placeholder="กรอกอีกครั้ง" style={inputStyle} />
            </label>
          )}
          {!!error && <div style={{ background: '#4a2a26', border: '1px solid #d95b4a', color: '#f0b3a8', borderRadius: 6, padding: '10px 14px', fontSize: 14 }}>{error}</div>}
          <button onClick={submit} style={{ background: '#e8762d', color: '#1b1d21', border: 'none', borderRadius: 8, padding: 14, fontWeight: 800, fontSize: 16, cursor: 'pointer' }}>
            {firstUse ? 'สร้างผู้ดูแลและเข้าสู่ระบบ' : 'เข้าสู่ระบบ'}
          </button>
        </div>
      </div>
    </div>
  );
}

function AdminAdminsTab({ admins, currentName, onAdd, onDelete, onChangePassword, onLogout }) {
  const [aName, setAName] = useState('');
  const [aPw, setAPw] = useState('');
  const [aPw2, setAPw2] = useState('');
  const [aError, setAError] = useState('');
  const [aOk, setAOk] = useState('');
  const [cOld, setCOld] = useState('');
  const [cNew, setCNew] = useState('');
  const [cNew2, setCNew2] = useState('');
  const [cError, setCError] = useState('');
  const [cOk, setCOk] = useState('');

  const add = async () => {
    setAOk('');
    const n = aName.trim();
    if (!n) return setAError('กรุณากรอกชื่อผู้ดูแล');
    if (admins.some(a => a.name === n)) return setAError('ชื่อ "' + n + '" มีอยู่แล้ว');
    if (aPw.length < 4) return setAError('รหัสผ่านอย่างน้อย 4 ตัวอักษร');
    if (aPw !== aPw2) return setAError('รหัสผ่านไม่ตรงกัน');
    await onAdd(n, aPw);
    setAName(''); setAPw(''); setAPw2(''); setAError('');
    setAOk('✓ เพิ่มผู้ดูแล "' + n + '" แล้ว');
  };
  const change = async () => {
    setCOk('');
    if (cNew.length < 4) return setCError('รหัสผ่านใหม่อย่างน้อย 4 ตัวอักษร');
    if (cNew !== cNew2) return setCError('รหัสผ่านใหม่ไม่ตรงกัน');
    const ok = await onChangePassword(cOld, cNew);
    if (!ok) return setCError('รหัสผ่านเดิมไม่ถูกต้อง');
    setCOld(''); setCNew(''); setCNew2(''); setCError('');
    setCOk('✓ เปลี่ยนรหัสผ่านเรียบร้อยแล้ว');
  };
  const pwInput = { ...inputStyle, padding: '10px 12px' };

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800 }}>จัดการผู้ดูแลระบบ</div>
          <div style={{ fontSize: 13, color: '#9a958d', marginTop: 3 }}>คุณล็อกอินเป็น: <b style={{ color: '#e8762d' }}>{currentName}</b> · ผู้ดูแลทั้งหมด {admins.length} คน</div>
        </div>
        <button onClick={onLogout} style={{ background: 'none', border: '1px solid #4a4f58', color: '#c8c3bb', borderRadius: 6, padding: '9px 16px', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>ออกจากระบบ</button>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 18 }}>
        <div style={{ ...card, padding: '16px 18px' }}>
          <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 12, color: '#e8762d' }}>เปลี่ยนรหัสผ่านของฉัน ({currentName})</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>รหัสผ่านเดิม</span>
              <input type="password" value={cOld} onChange={e => { setCOld(e.target.value); setCError(''); }} style={pwInput} />
            </label>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>รหัสผ่านใหม่</span>
              <input type="password" value={cNew} onChange={e => { setCNew(e.target.value); setCError(''); }} style={pwInput} />
            </label>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>ยืนยันรหัสผ่านใหม่</span>
              <input type="password" value={cNew2} onChange={e => { setCNew2(e.target.value); setCError(''); }} style={pwInput} />
            </label>
            {!!cError && <div style={{ background: '#4a2a26', border: '1px solid #d95b4a', color: '#f0b3a8', borderRadius: 6, padding: '10px 14px', fontSize: 14 }}>{cError}</div>}
            {!!cOk && <div style={{ background: '#2c4a2a', border: '1px solid #6dbf5b', color: '#b9e6ae', borderRadius: 6, padding: '10px 14px', fontSize: 14 }}>{cOk}</div>}
            <button onClick={change} style={{ background: '#e8762d', color: '#1b1d21', border: 'none', borderRadius: 6, padding: 12, fontWeight: 800, fontSize: 14, cursor: 'pointer' }}>เปลี่ยนรหัสผ่าน</button>
          </div>
        </div>

        <div style={{ ...card, padding: '16px 18px' }}>
          <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 12, color: '#e8762d' }}>เพิ่มผู้ดูแลใหม่</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>ชื่อผู้ดูแล</span>
              <input type="text" value={aName} onChange={e => { setAName(e.target.value); setAError(''); }} placeholder="เช่น หัวหน้าโอ๋" style={pwInput} />
            </label>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>รหัสผ่าน</span>
              <input type="password" value={aPw} onChange={e => { setAPw(e.target.value); setAError(''); }} style={pwInput} />
            </label>
            <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <span style={labelStyle}>ยืนยันรหัสผ่าน</span>
              <input type="password" value={aPw2} onChange={e => { setAPw2(e.target.value); setAError(''); }} style={pwInput} />
            </label>
            {!!aError && <div style={{ background: '#4a2a26', border: '1px solid #d95b4a', color: '#f0b3a8', borderRadius: 6, padding: '10px 14px', fontSize: 14 }}>{aError}</div>}
            {!!aOk && <div style={{ background: '#2c4a2a', border: '1px solid #6dbf5b', color: '#b9e6ae', borderRadius: 6, padding: '10px 14px', fontSize: 14 }}>{aOk}</div>}
            <button onClick={add} style={{ background: '#e8762d', color: '#1b1d21', border: 'none', borderRadius: 6, padding: 12, fontWeight: 800, fontSize: 14, cursor: 'pointer' }}>+ เพิ่มผู้ดูแล</button>
          </div>
        </div>
      </div>

      <div style={{ ...card, overflow: 'hidden' }}>
        <div style={{ background: '#1b1d21', padding: '10px 18px', fontSize: 13, fontWeight: 700, color: '#9a958d' }}>รายชื่อผู้ดูแลทั้งหมด</div>
        {admins.map(a => (
          <div key={a.name} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, padding: '12px 18px', borderBottom: '1px solid #3a3e45' }}>
            <div style={{ fontWeight: 700, fontSize: 15 }}>
              {a.name}
              {a.name === currentName && <span style={{ color: '#6dbf5b', fontWeight: 600, fontSize: 12, marginLeft: 8 }}>(คุณ)</span>}
            </div>
            {a.name !== currentName && (
              <button onClick={() => { if (confirm('ลบผู้ดูแล "' + a.name + '"?')) onDelete(a.name); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, padding: '6px 12px', fontSize: 12, cursor: 'pointer' }}>ลบ</button>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminReportsTab({ reports, workers, knownSites, onEdit, onDelete, onPrint, onExportCsv }) {
  const [filterWorker, setFilterWorker] = useState('');
  const [filterSite, setFilterSite] = useState('');
  const [filterDateFrom, setFilterDateFrom] = useState('');
  const [filterDateTo, setFilterDateTo] = useState('');

  let filtered = reports.slice().sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  if (filterWorker) filtered = filtered.filter(r => r.worker === filterWorker);
  if (filterSite) filtered = filtered.filter(r => r.site.trim() === filterSite);
  if (filterDateFrom) filtered = filtered.filter(r => r.date >= filterDateFrom);
  if (filterDateTo) filtered = filtered.filter(r => r.date <= filterDateTo);

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap', marginBottom: 18 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800 }}>รายงานรวมทุกคน</div>
          <div style={{ fontSize: 13, color: '#9a958d', marginTop: 3 }}>ทั้งหมด {filtered.length} รายการ</div>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <select value={filterWorker} onChange={e => setFilterWorker(e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }}>
            <option value="">พนักงานทุกคน</option>
            {workers.map(w => <option key={w.nick} value={w.nick}>{w.nick}</option>)}
          </select>
          <select value={filterSite} onChange={e => setFilterSite(e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }}>
            <option value="">ทุกหน่วยงาน</option>
            {knownSites.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <input type="date" value={filterDateFrom} onChange={e => setFilterDateFrom(e.target.value)} title="จากวันที่" style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }} />
            <span style={{ color: '#9a958d', fontSize: 13 }}>ถึง</span>
            <input type="date" value={filterDateTo} onChange={e => setFilterDateTo(e.target.value)} title="ถึงวันที่" style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }} />
          </div>
          <button onClick={() => { setFilterWorker(''); setFilterSite(''); setFilterDateFrom(''); setFilterDateTo(''); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 6, padding: '9px 14px', fontSize: 13, cursor: 'pointer' }}>ล้าง</button>
          <button onClick={() => onExportCsv(filtered)} style={{ background: '#e8762d', border: 'none', color: '#1b1d21', borderRadius: 6, padding: '9px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>↓ Export CSV</button>
          <button onClick={() => onPrint(filtered, { filterWorker, filterSite, filterDateFrom, filterDateTo })} style={{ background: 'none', border: '1px solid #e8762d', color: '#e8762d', borderRadius: 6, padding: '9px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>🖨 พิมพ์ PDF</button>
        </div>
      </div>

      {filtered.length === 0 && <div style={{ background: '#2c2f35', border: '1px dashed #4a4f58', borderRadius: 10, padding: '50px 20px', textAlign: 'center', color: '#9a958d', fontSize: 15 }}>ยังไม่มีรายงาน — เมื่อพนักงานกรอกข้อมูล จะแสดงที่นี่</div>}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {filtered.map(r => (
          <div key={r.id} style={{ ...card, padding: '14px 16px', display: 'grid', gridTemplateColumns: '120px 1fr auto', gap: 14, alignItems: 'start' }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: 15, color: '#e8762d' }}>{r.worker}</div>
              <div style={{ fontSize: 12, color: '#9a958d', marginTop: 2 }}>{thDate(r.date)}</div>
              <div style={{ fontSize: 12, color: '#c8c3bb', marginTop: 2 }}>{r.site}</div>
            </div>
            <div>
              {r.items.map((it, i) => (
                <div key={i} style={{ fontSize: 13, color: '#e9e6e1', padding: '3px 0', borderBottom: '1px dotted #3a3e45', display: 'flex', justifyContent: 'space-between', gap: 10 }}>

function AdminPilesTab({ reports }) {
  const bySite = {};
  for (const r of reports) {
    const site = r.site.trim() || '(ไม่ระบุ)';
    bySite[site] = bySite[site] || {};
    for (const it of r.items) {
      const p = it.pile.trim(); if (!p) continue;
      bySite[site][p] = (bySite[site][p] || 0) + (Number(it.count) || 0);
    }
  }
  const pileSummary = Object.keys(bySite).sort().map(site => {
    const rows = Object.keys(bySite[site]).sort();
    const max = Math.max(1, ...rows.map(p => bySite[site][p]));
    let total = 0; rows.forEach(p => total += bySite[site][p]);
    return { name: site, total, rows: rows.map(p => ({ pile: p, total: bySite[site][p], pct: Math.round(bySite[site][p] / max * 100) })) };
  });
  return (
    <div>
      <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>ยอดตอกสะสมรายเสา</div>
      <div style={{ fontSize: 13, color: '#9a958d', marginBottom: 20 }}>แยกตามหน่วยงาน + ชนิดเสา</div>
      {reports.length === 0 && <div style={{ background: '#2c2f35', border: '1px dashed #4a4f58', borderRadius: 10, padding: '50px 20px', textAlign: 'center', color: '#9a958d', fontSize: 15 }}>ยังไม่มีข้อมูล</div>}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        {pileSummary.map(site => (
          <div key={site.name} style={{ ...card, overflow: 'hidden' }}>
            <div style={{ background: '#1b1d21', padding: '12px 18px', fontWeight: 800, fontSize: 16, borderLeft: '4px solid #e8762d' }}>{site.name} <span style={{ color: '#9a958d', fontWeight: 500, fontSize: 13 }}>— รวม {num(site.total)} ต้น</span></div>
            <div style={{ padding: '6px 18px 14px' }}>
              {site.rows.map(row => (
                <div key={row.pile} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: '1px solid #3a3e45' }}>
                  <div style={{ fontSize: 14, minWidth: 0 }}>{row.pile}</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
                    <div style={{ width: 160, height: 8, background: '#23262b', borderRadius: 4, overflow: 'hidden' }}><div style={{ height: '100%', background: '#e8762d', width: row.pct + '%' }} /></div>
                    <div style={{ fontWeight: 800, fontSize: 16, minWidth: 70, textAlign: 'right' }}>{num(row.total)} ต้น</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminWorkersTab({ workers, reports, onSave, onDelete }) {
  const [fullName, setFullName] = useState('');
  const [nick, setNick] = useState('');
  const [editingNick, setEditingNick] = useState(null);
  const [error, setError] = useState('');

  const save = () => {
    const full = fullName.trim(), n = nick.trim();
    if (!full || !n) return setError('กรุณากรอกชื่อ-นามสกุล และชื่อเล่น');
    const dup = workers.some(w => w.nick === n && n !== editingNick);
    if (dup) return setError('ชื่อเล่น "' + n + '" มีอยู่แล้ว กรุณาใช้ชื่ออื่น');
    onSave({ fullName: full, nick: n, editingNick });
    setFullName(''); setNick(''); setEditingNick(null); setError('');
  };
  const cancel = () => { setFullName(''); setNick(''); setEditingNick(null); setError(''); };

  return (
    <div>
      <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>จัดการรายชื่อพนักงาน</div>
      <div style={{ fontSize: 13, color: '#9a958d', marginBottom: 20 }}>ทั้งหมด {workers.length} คน · ชื่อเล่นใช้เป็นลิงก์ประจำตัว (?user=ชื่อเล่น)</div>

      <div style={{ ...card, padding: '16px 18px', marginBottom: 18 }}>
        <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 12, color: '#e8762d' }}>{editingNick ? 'แก้ไขพนักงาน: ' + editingNick : 'เพิ่มพนักงานใหม่'}</div>
        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr auto auto', gap: 10, alignItems: 'end' }}>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <span style={labelStyle}>ชื่อ-นามสกุล</span>
            <input type="text" value={fullName} onChange={e => { setFullName(e.target.value); setError(''); }} placeholder="เช่น นายสมชาย ใจดี" style={inputStyle} />
          </label>
          <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            <span style={labelStyle}>ชื่อเล่น</span>
            <input type="text" value={nick} onChange={e => { setNick(e.target.value); setError(''); }} placeholder="เช่น ชาย" style={inputStyle} />
          </label>
          <button onClick={save} style={{ background: '#e8762d', color: '#1b1d21', border: 'none', borderRadius: 6, padding: '12px 20px', fontWeight: 800, fontSize: 14, cursor: 'pointer' }}>{editingNick ? 'บันทึก' : '+ เพิ่ม'}</button>
          {editingNick && <button onClick={cancel} style={{ background: 'none', border: '1px solid #4a4f58', color: '#c8c3bb', borderRadius: 6, padding: '12px 16px', fontSize: 13, cursor: 'pointer' }}>ยกเลิก</button>}
        </div>
        {!!error && <div style={{ background: '#4a2a26', border: '1px solid #d95b4a', color: '#f0b3a8', borderRadius: 6, padding: '10px 14px', fontSize: 14, marginTop: 12 }}>{error}</div>}
      </div>

      <div style={{ ...card, overflow: 'hidden' }}>
        {workers.map(w => (
          <div key={w.nick} style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 12, padding: '12px 18px', borderBottom: '1px solid #3a3e45', alignItems: 'center' }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontWeight: 700, fontSize: 15 }}>{w.full_name} <span style={{ color: '#e8762d', fontWeight: 600, fontSize: 13 }}>({w.nick})</span></div>
              <div style={{ fontSize: 12, color: '#9a958d' }}>มีรายงาน {reports.filter(r => r.worker === w.nick).length} รายการ</div>
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              <button onClick={() => { setFullName(w.full_name); setNick(w.nick); setEditingNick(w.nick); setError(''); }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#e8762d', borderRadius: 5, padding: '6px 12px', fontSize: 12, cursor: 'pointer' }}>แก้ไข</button>
              <button onClick={() => {
                const n = reports.filter(r => r.worker === w.nick).length;
                const msg = n > 0 ? 'ลบ ' + w.nick + '? (รายงานเดิม ' + n + ' รายการจะยังอยู่ในระบบ)' : 'ลบ ' + w.nick + '?';
                if (confirm(msg)) onDelete(w.nick);
              }} style={{ background: 'none', border: '1px solid #4a4f58', color: '#9a958d', borderRadius: 5, padding: '6px 12px', fontSize: 12, cursor: 'pointer' }}>ลบ</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminMonthlyTab({ workers, reports, rates, onPrint }) {
  const [month, setMonth] = useState(new Date().toISOString().slice(0, 7));
  const monReports = reports.filter(r => r.date.slice(0, 7) === month);
  const rows = workers.map(w => {
    const mine = monReports.filter(r => r.worker === w.nick);
    if (!mine.length) return null;
    const byDate = {};
    for (const r of mine) if (!byDate[r.date]) byDate[r.date] = r;
    const days = Object.keys(byDate).length;
    let money = 0;
    for (const d of Object.keys(byDate)) money += wearRate(byDate[d].vehicle, rates) + fieldMoney(byDate[d]);
    const agg = {}; let total = 0;
    for (const r of mine) for (const it of r.items) {
      const k = r.site + '||' + it.pile;
      agg[k] = (agg[k] || 0) + (Number(it.count) || 0);
      total += Number(it.count) || 0;
    }
    return { nick: w.nick, fullName: w.full_name, days, total, money, rows: Object.keys(agg).sort().map(k => { const [site, pile] = k.split('||'); return { site, pile, count: agg[k] }; }) };
  }).filter(Boolean);
  const [y, m] = month.split('-').map(Number);
  const monthTh = MONTHS_TH[m - 1] + ' ' + (y + 543);

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 14, flexWrap: 'wrap', marginBottom: 18 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800 }}>สรุปรายเดือนต่อพนักงาน</div>
          <div style={{ fontSize: 13, color: '#9a958d', marginTop: 3 }}>เดือน {monthTh}</div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <input type="month" value={month} onChange={e => setMonth(e.target.value)} style={{ ...inputStyle, width: 'auto', padding: '9px 12px' }} />
          <button onClick={() => onPrint(rows, monthTh)} style={{ background: 'none', border: '1px solid #e8762d', color: '#e8762d', borderRadius: 6, padding: '9px 16px', fontSize: 13, fontWeight: 700, cursor: 'pointer' }}>🖨 พิมพ์ PDF</button>
        </div>
      </div>
      {rows.length === 0 && <div style={{ background: '#2c2f35', border: '1px dashed #4a4f58', borderRadius: 10, padding: '50px 20px', textAlign: 'center', color: '#9a958d', fontSize: 15 }}>ไม่มีรายงานในเดือนนี้</div>}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {rows.map(m => (
          <div key={m.nick} style={{ ...card, overflow: 'hidden' }}>
            <div style={{ background: '#1b1d21', padding: '12px 18px', borderLeft: '4px solid #e8762d', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
              <div style={{ fontWeight: 800, fontSize: 16 }}>{m.nick} <span style={{ color: '#9a958d', fontWeight: 500, fontSize: 13 }}>{m.fullName}</span></div>
              <div style={{ display: 'flex', gap: 18, fontSize: 13, color: '#c8c3bb', flexWrap: 'wrap' }}>
                <span>ทำงาน <b style={{ color: '#e9e6e1' }}>{m.days}</b> วัน</span>
                <span>ตอกรวม <b style={{ color: '#f0b98c', fontSize: 15 }}>{num(m.total)}</b> ต้น</span>
                <span>ค่ารถ <b style={{ color: '#f0b98c' }}>{num(m.money)}</b> บาท</span>
              </div>
            </div>
            <div style={{ padding: '6px 18px 12px' }}>
              {m.rows.map((row, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', gap: 12, padding: '8px 0', borderBottom: '1px dotted #3a3e45', fontSize: 13 }}>
                  <span style={{ minWidth: 0, color: '#c8c3bb' }}>{row.site} — {row.pile}</span>
                  <span style={{ fontWeight: 700, whiteSpace: 'nowrap' }}>{num(row.count)} ต้น</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

    for (const d of dates) { wear += wearRate(byDate[d].vehicle, rates); field += fieldMoney(byDate[d]); }

      </div>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: 24 }}>
        <div style={{ borderBottom: '3px solid #e8762d', paddingBottom: 12, marginBottom: 18 }}>

          <div style={{ fontSize: 13, color: '#666', marginTop: 4 }}>เดือน {monthTh} · พิมพ์เมื่อ {thDate(new Date().toISOString().slice(0, 10))}</div>
        </div>
        {rows.map(m => (
          <div key={m.nick} style={{ marginBottom: 16, breakInside: 'avoid' }}>
            <div style={{ background: '#f0ede9', borderLeft: '4px solid #e8762d', padding: '8px 12px', display: 'flex', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap', fontSize: 13 }}>
              <b>{m.nick} {m.fullName}</b>
              <span>ทำงาน {m.days} วัน · ตอกรวม <b>{num(m.total)}</b> ต้น · ค่ารถ <b>{num(m.money)}</b> บาท</span>

        ))}

    </div>

        <button onClick={() => window.print()} style={{ background: '#e8762d', color: '#1b1d21', border: 'none', borderRadius: 6, padding: '11px 22px', fontWeight: 800, fontSize: 15, cursor: 'pointer' }}>🖨 พิมพ์ / บันทึก PDF</button>
        <button onClick={onClose} style={{ background: 'none', border: '1px solid #bbb', color: '#555', borderRadius: 6, padding: '11px 18px', fontSize: 14, cursor: 'pointer' }}>← กลับ</button>
      </div>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: 24 }}>

          <div style={{ fontSize: 13, color: '#666', marginTop: 4 }}>เดือน {monthTh} · พิมพ์เมื่อ {thDate(new Date().toISOString().slice(0, 10))}</div>

          <div style={{ borderTop: '1px dotted #888', paddingTop: 8 }}>ผู้จัดทำ</div>
          <div style={{ borderTop: '1px dotted #888', paddingTop: 8 }}>ผู้ตรวจสอบ</div>
          <div style={{ borderTop: '1px dotted #888', paddingTop: 8 }}>ผู้อนุมัติ</div>
        </div>
      </div>

  );
}

function exportCsv(filtered, reports) {
  const rows = [['วันที่', 'พนักงาน', 'หน่วยงาน', 'ลักษณะงาน', 'ชนิดเสา', 'จำนวนตอก', 'ยอดสะสม', 'เวลาเข้า', 'เวลาออก', 'รถที่ใช้', 'ระยะทาง(กม.)', 'ค่าสึกหรอ', 'ค่าออกสนาม', 'หมายเหตุ']];
  const wtTh = w => w === 'clear' ? 'เคลียร์พื้นที่' : w === 'none' ? 'ไปแต่ไม่ได้ตอก' : 'ตอกเสาเข็ม';
  for (const r of filtered) {
    const base = [r.date, r.worker, r.site, wtTh(r.workType)];
    const tail = [r.timeIn, r.timeOut, vehicleTh(r.vehicle), r.distanceKm || '', 0, fieldMoney(r), r.note || ''];
    if (r.items.length) for (const it of r.items) rows.push([...base, it.pile, it.count, cumFor(reports, r.site, it.pile, r.date, null), ...tail]);
    else rows.push([...base, '', '', '', ...tail]);
  }
  const csv = '﻿' + rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = 'รายงานตอกเสาเข็ม.csv';
  a.click();
}

function App() {
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState('');
  const [workers, setWorkers] = useState([]);
  const [reports, setReports] = useState([]);
  const [homes, setHomes] = useState({});
  const [rates, setRates] = useState({ car: 250, moto: 100 });
  const [admins, setAdmins] = useState([]);

  const [view, setView] = useState('home');
  const [worker, setWorker] = useState(null);
  const [tab, setTab] = useState('reports');
  const [adminAuthed, setAdminAuthed] = useState(sessionStorage.getItem('field_admin_authed') === '1');
  const [adminName, setAdminName] = useState(sessionStorage.getItem('field_admin_name') || '');
  const [editingReport, setEditingReport] = useState(null);
  const [printPayload, setPrintPayload] = useState(null); // { kind, ...data }

  const load = useCallback(async () => {
    try {
      const [wRes, rRes, hRes, sRes] = await Promise.all([
        DB.from('field_workers').select('*').order('created_at', { ascending: true }),
        DB.from('field_reports').select('*').order('date', { ascending: false }),
        DB.from('field_homes').select('*'),
        DB.from('field_settings').select('*'),
      ]);
      if (wRes.error) throw wRes.error;
      if (rRes.error) throw rRes.error;
      if (hRes.error) throw hRes.error;
      if (sRes.error) throw sRes.error;

      setWorkers(wRes.data || []);
      setReports((rRes.data || []).map(r => ({
        id: r.id, worker: r.worker_nick, date: r.date, site: r.site, items: r.items || [],
        timeIn: r.time_in, timeOut: r.time_out, vehicle: r.vehicle, distanceKm: Number(r.distance_km) || 0,
        workType: r.work_type, note: r.note || ''
      })));
      const hm = {}; (hRes.data || []).forEach(h => { hm[h.worker_nick] = { lat: h.lat, lng: h.lng }; });
      setHomes(hm);
      const settings = {}; (sRes.data || []).forEach(s => { settings[s.key] = s.value; });
      setRates({ car: Number(settings.rate_car) || 250, moto: Number(settings.rate_moto) || 100 });
      let adminUsers = [];
      try { adminUsers = JSON.parse(settings.admin_users || '[]'); } catch (e) { adminUsers = []; }
      if (!Array.isArray(adminUsers)) adminUsers = [];
      // migrate from the old single-password scheme
      if (!adminUsers.length && settings.admin_password_hash) {
        adminUsers = [{ name: 'แอดมิน', hash: settings.admin_password_hash }];
        await DB.from('field_settings').upsert({ key: 'admin_users', value: JSON.stringify(adminUsers) });
        await DB.from('field_settings').delete().eq('key', 'admin_password_hash');
      }
      setAdmins(adminUsers);
      // sessions from the old single-password scheme have no admin name — ask to log in again
      if (sessionStorage.getItem('field_admin_authed') === '1' && !sessionStorage.getItem('field_admin_name')) {
        sessionStorage.removeItem('field_admin_authed');
        setAdminAuthed(false);
      }

      const params = new URLSearchParams(location.search);
      const u = params.get('user');
      if (u && (wRes.data || []).some(w => w.nick === u)) { setView('form'); setWorker(u); }
    } catch (e) {
      console.error(e);
      setLoadError('เชื่อมต่อ Supabase ไม่สำเร็จ: ' + (e.message || e));
    } finally {
      setLoading(false);
      const overlay = document.getElementById('loading-overlay');
      if (overlay) overlay.remove();
    }
  }, []);

  useEffect(() => { load(); }, [load]);

  const knownSites = useMemo(() => [...new Set(reports.map(r => r.site.trim()).filter(Boolean))], [reports]);
  const knownPiles = useMemo(() => [...new Set(reports.flatMap(r => r.items.map(i => i.pile.trim())).filter(Boolean))], [reports]);
  const workerRec = workers.find(w => w.nick === worker);

  const saveReport = async (report) => {
    const row = {
      id: report.id, worker_nick: report.worker, date: report.date, site: report.site, items: report.items,
      time_in: report.timeIn, time_out: report.timeOut, vehicle: report.vehicle,
      distance_km: report.distanceKm, work_type: report.workType, note: report.note
    };
    const { error } = await DB.from('field_reports').upsert(row);
    if (error) return alert('บันทึกไม่สำเร็จ: ' + error.message);
    setEditingReport(null);
    await load();
  };
  const deleteReport = async (id) => {
    const { error } = await DB.from('field_reports').delete().eq('id', id);
    if (error) return alert('ลบไม่สำเร็จ: ' + error.message);
    await load();
  };
  const setHome = async (nick, loc) => {
    const { error } = await DB.from('field_homes').upsert({ worker_nick: nick, lat: loc.lat, lng: loc.lng, updated_at: new Date().toISOString() });
    if (error) return alert('บันทึกตำแหน่งบ้านไม่สำเร็จ: ' + error.message);
    await load();
  };
  const saveWorker = async ({ fullName, nick, editingNick }) => {
    if (editingNick && editingNick !== nick) {
      const { error: insErr } = await DB.from('field_workers').insert({ nick, full_name: fullName });
      if (insErr) return alert('บันทึกไม่สำเร็จ: ' + insErr.message);
      await DB.from('field_reports').update({ worker_nick: nick }).eq('worker_nick', editingNick);
      await DB.from('field_homes').update({ worker_nick: nick }).eq('worker_nick', editingNick);
      await DB.from('field_workers').delete().eq('nick', editingNick);
    } else {
      const { error } = await DB.from('field_workers').upsert({ nick, full_name: fullName });
      if (error) return alert('บันทึกไม่สำเร็จ: ' + error.message);
    }
    await load();
  };
  const deleteWorker = async (nick) => {
    const { error } = await DB.from('field_workers').delete().eq('nick', nick);
    if (error) return alert('ลบไม่สำเร็จ: ' + error.message);
    await load();
  };
  const setRatesRemote = async (next) => {
    setRates(next);
    await DB.from('field_settings').upsert([{ key: 'rate_car', value: String(next.car) }, { key: 'rate_moto', value: String(next.moto) }]);
  };
  const saveAdmins = async (list) => {
    const { error } = await DB.from('field_settings').upsert({ key: 'admin_users', value: JSON.stringify(list) });
    if (error) { alert('บันทึกไม่สำเร็จ: ' + error.message); return false; }
    setAdmins(list);
    return true;
  };
  const beginSession = (name) => {
    sessionStorage.setItem('field_admin_authed', '1');
    sessionStorage.setItem('field_admin_name', name);
    setAdminAuthed(true);
    setAdminName(name);
  };
  const setupAdmin = async (name, pw) => {
    const hash = await sha256Hex(pw);
    if (await saveAdmins([{ name, hash }])) beginSession(name);
  };
  const loginAdmin = async (name, pw) => {
    const hash = await sha256Hex(pw);
    const rec = admins.find(a => a.name === name && a.hash === hash);
    if (!rec) return false;
    beginSession(name);
    return true;
  };
  const logoutAdmin = () => {
    sessionStorage.removeItem('field_admin_authed');
    sessionStorage.removeItem('field_admin_name');
    setAdminAuthed(false);
    setAdminName('');
  };
  const addAdmin = async (name, pw) => {
    const hash = await sha256Hex(pw);
    await saveAdmins([...admins, { name, hash }]);
  };
  const deleteAdmin = async (name) => {
    await saveAdmins(admins.filter(a => a.name !== name));
  };
  const changeAdminPassword = async (oldPw, newPw) => {
    const oldHash = await sha256Hex(oldPw);
    const me = admins.find(a => a.name === adminName);
    if (!me || me.hash !== oldHash) return false;
    const newHash = await sha256Hex(newPw);
    return await saveAdmins(admins.map(a => a.name === adminName ? { ...a, hash: newHash } : a));
  };

  const doExportCsv = (filtered) => exportCsv(filtered, reports);

  const openPrintReports = (filtered, filters) => {
    const rows = filtered.flatMap(r => {
      const base = { dateTh: thDate(r.date), nick: r.worker, site: r.site, time: r.timeIn + '–' + r.timeOut, vehicle: vehicleTh(r.vehicle) + (r.distanceKm ? ' / ' + r.distanceKm + ' กม.' : '') };
      if (!r.items.length) return [{ ...base, pile: r.workType === 'clear' ? 'เคลียร์พื้นที่หน้างาน' : 'ไปหน้างานแต่ไม่ได้ตอก', count: '-', cum: '-' }];
      return r.items.map(it => ({ ...base, pile: it.pile, count: num(it.count), cum: num(cumFor(reports, r.site, it.pile, r.date, null)) }));
    });
    const subtitle = [filters.filterWorker && ('พนักงาน: ' + filters.filterWorker), filters.filterSite && ('หน่วยงาน: ' + filters.filterSite),
      (filters.filterDateFrom || filters.filterDateTo) && ('วันที่ ' + (filters.filterDateFrom ? thDate(filters.filterDateFrom) : '...') + ' ถึง ' + (filters.filterDateTo ? thDate(filters.filterDateTo) : '...'))]
      .filter(Boolean).join(' · ') || ('ทั้งหมด ' + filtered.length + ' รายการ');
    setPrintPayload({ kind: 'reports', rows, subtitle });
  };
  const openPrintMonthly = (rows, monthTh) => setPrintPayload({ kind: 'monthly', rows: rows.map(r => ({ ...r, total: r.total })), monthTh });
  const openPrintCar = (rows, grandTotal, monthTh) => setPrintPayload({ kind: 'car', rows, grandTotal, monthTh });

  if (loading) return null; // loading-overlay in the DOM handles this
  if (loadError) return <div style={{ padding: 40, color: '#f0b3a8' }}>{loadError}</div>;

  if (printPayload) {
    if (printPayload.kind === 'reports') return <PrintReportsView rows={printPayload.rows} subtitle={printPayload.subtitle} onClose={() => setPrintPayload(null)} />;
    if (printPayload.kind === 'monthly') return <PrintMonthlyView rows={printPayload.rows} monthTh={printPayload.monthTh} onClose={() => setPrintPayload(null)} />;
    if (printPayload.kind === 'car') return <PrintCarView rows={printPayload.rows} grandTotal={printPayload.grandTotal} monthTh={printPayload.monthTh} onClose={() => setPrintPayload(null)} />;
  }

  return (
    <div style={{ minHeight: '100vh', background: '#23262b', color: '#e9e6e1' }}>
      <TopBar view={view} worker={worker} workerFull={workerRec ? (workerRec.full_name + ' (' + workerRec.nick + ')') : ''} tab={tab}
        onHome={() => setView('home')} onAdminTab={setTab} />

      {view === 'home' && <HomeView workers={workers} onOpen={nick => { setWorker(nick); setEditingReport(null); setView('form'); }} onGoAdmin={() => setView('admin')} />}

      {view === 'form' && (
        <WorkerFormView
          worker={worker} workerFull={workerRec ? (workerRec.full_name + ' (' + workerRec.nick + ')') : worker}
          reports={reports} homes={homes} knownSites={knownSites} knownPiles={knownPiles}
          editingReport={editingReport} onCancelEdit={() => setEditingReport(null)}
          onSave={saveReport} onDelete={deleteReport} onEdit={setEditingReport} onSetHome={setHome}
        />
      )}

      {view === 'admin' && !adminAuthed && (
        <AdminLoginView admins={admins} onSetup={setupAdmin} onLogin={loginAdmin} />
      )}

      {view === 'admin' && adminAuthed && (
        <div style={{ maxWidth: 1100, margin: '0 auto', padding: '28px 20px 80px' }}>
          {tab === 'reports' && <AdminReportsTab reports={reports} workers={workers} knownSites={knownSites} onEdit={r => { setEditingReport(r); setWorker(r.worker); setView('form'); }} onDelete={deleteReport} onPrint={openPrintReports} onExportCsv={doExportCsv} />}
          {tab === 'piles' && <AdminPilesTab reports={reports} />}
          {tab === 'monthly' && <AdminMonthlyTab workers={workers} reports={reports} rates={rates} onPrint={openPrintMonthly} />}
          {tab === 'car' && <AdminCarTab workers={workers} reports={reports} rates={rates} onSetRates={setRatesRemote} onPrint={openPrintCar} />}
          {tab === 'workers' && <AdminWorkersTab workers={workers} reports={reports} onSave={saveWorker} onDelete={deleteWorker} />}
          {tab === 'admins' && <AdminAdminsTab admins={admins} currentName={adminName} onAdd={addAdmin} onDelete={deleteAdmin} onChangePassword={changeAdminPassword} onLogout={logoutAdmin} />}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
